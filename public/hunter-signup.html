<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>IdealOne.Hunter — Create your company account</title>
<style>
  :root { --brand: #1B6BE8; --ink: #111827; --ink-2: #4B5563; --line: #E5E7EB; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #F5F6F8; color: var(--ink);
    font: 15px/1.5 -apple-system, "Segoe UI", Roboto, Arial, Helvetica, sans-serif;
  }
  .card {
    background: #fff; border: 1px solid var(--line); border-radius: 16px;
    padding: 34px 34px 28px; width: 420px; max-width: calc(100vw - 32px);
    box-shadow: 0 10px 30px rgba(17, 24, 39, .06); text-align: center;
  }
  .card img { height: 120px; margin-bottom: 4px; }
  h1 { font-size: 18px; margin: 0 0 2px; }
  .sub { color: var(--ink-2); font-size: 13px; margin-bottom: 20px; }
  label { display: block; text-align: left; font-size: 12.5px; font-weight: 700; color: var(--ink-2); margin: 10px 0 4px; }
  input {
    width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 11px 13px;
    font: inherit; background: #FDFDFD;
  }
  input:focus { outline: 2px solid var(--brand); outline-offset: -1px; border-color: var(--brand); }
  button {
    width: 100%; background: var(--brand); color: #fff; border: none; border-radius: 9px;
    padding: 12px; font: 700 15px inherit; cursor: pointer; margin-top: 18px;
  }
  button:hover { background: #1557BE; }
  .err { color: #B91C1C; font-size: 13px; min-height: 20px; margin: 8px 0 0; font-weight: 600; }
  footer { margin-top: 14px; color: #9CA3AF; font-size: 12.5px; }
  footer a { color: var(--brand); text-decoration: none; }
</style>
</head>
<body>
  <form class="card" id="form">
    <img src="/hunter-logo.svg" alt="IdealOne.Hunter">
    <h1>Create your company account</h1>
    <div class="sub">Tell us who you are — next you'll describe the leads you want.</div>
    <label>Company name</label>
    <input id="company" placeholder="Acme Trading Pte Ltd" required>
    <label>Your name</label>
    <input id="name" placeholder="Full name" required>
    <label>Work email</label>
    <input id="email" type="email" placeholder="you@company.com" autocomplete="username" required>
    <label>Password</label>
    <input id="password" type="password" placeholder="Min 8 characters" autocomplete="new-password" required>
    <button type="submit">Create account →</button>
    <div class="err" id="err"></div>
    <footer>Already have an account? <a href="/hunter/login">Sign in</a></footer>
  </form>
<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  err.textContent = '';
  const r = await fetch('/api/hunter/auth/signup', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      company: document.getElementById('company').value,
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
    }),
  });
  const data = await r.json();
  if (data.ok) location.href = '/hunter/setup';
  else err.textContent = data.error || 'Sign up failed';
});
</script>
</body>
</html>
