<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VaultKeepers — Staff Panel</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root{--bg:#060709;--bg-2:#0d0f14;--surface:#111520;--border:rgba(255,255,255,.08);--text:#e4e0d8;--text-2:#888480;--text-3:#484440;--cyan:#00e5cc;--green:#00e676;--red:#ff4060;--gold:#f5c842;--purple:#a080ff;--mono:'Courier New',Courier,monospace;--sans:system-ui,-apple-system,'Segoe UI',sans-serif}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:14px}body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

  /* ── LOGIN ── */
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:44px 40px;width:100%;max-width:380px;text-align:center}
  .vk-logo{font-size:1.6rem;font-weight:900;letter-spacing:.08em;margin-bottom:6px}
  .vk-logo span{color:var(--purple)}
  .vk-sub{font-size:.78rem;color:var(--text-3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:32px}
  .lfield{margin-bottom:16px;text-align:left}
  .lfield label{display:block;font-family:var(--mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-2);margin-bottom:7px}
  .lfield input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:11px 14px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .15s}
  .lfield input:focus{border-color:var(--purple)}
  .btn-login{width:100%;background:var(--purple);color:#fff;font-weight:700;font-size:.9rem;padding:13px;border-radius:6px;border:none;cursor:pointer;margin-top:4px;transition:opacity .15s}
  .btn-login:hover{opacity:.85}.btn-login:disabled{opacity:.4;cursor:default}
  .lerr{font-size:.78rem;color:var(--red);margin-top:12px;display:none}

  /* ── DASHBOARD ── */
  #dashboard{display:none}
  .topbar{background:var(--bg-2);border-bottom:1px solid var(--border);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .vk-brand{font-size:.85rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase}
  .vk-brand span{color:var(--purple)}
  .tb-right{display:flex;align-items:center;gap:12px}
  .tb-badge{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;background:rgba(160,128,255,.15);color:var(--purple);border:1px solid rgba(160,128,255,.3);padding:3px 10px;border-radius:4px}
  .btn-sm{font-family:var(--mono);font-size:.65rem;letter-spacing:.08em;padding:5px 12px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text-2);cursor:pointer;transition:color .15s,border-color .15s}
  .btn-sm:hover{color:var(--text);border-color:rgba(255,255,255,.25)}

  .content{padding:28px}

  /* ── STATS ── */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 22px}
  .stat-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
  .stat-val{font-size:2rem;font-weight:800;line-height:1}
  .stat-val.green{color:var(--green)}.stat-val.gold{color:var(--gold)}.stat-val.red{color:var(--red)}.stat-val.purple{color:var(--purple)}
  .stat-note{font-size:.7rem;color:var(--text-3);margin-top:6px}

  /* ── TABLE ── */
  .table-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .section-title{font-family:var(--mono);font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-2)}
  .search-box{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-size:.82rem;outline:none;width:200px;transition:border-color .15s}
  .search-box:focus{border-color:var(--purple)}
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  th{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
  td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.84rem;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.02)}
  .badge{display:inline-block;font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:3px}
  .badge.active{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.25)}
  .badge.inactive{background:rgba(255,64,96,.1);color:var(--red);border:1px solid rgba(255,64,96,.25)}
  .badge.pending{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.25)}
  .badge.cancelled{background:rgba(255,64,96,.06);color:#884050;border:1px solid rgba(255,64,96,.15)}
  .mono{font-family:var(--mono);font-size:.78rem}
  .action-btn{font-family:var(--mono);font-size:.6rem;letter-spacing:.06em;padding:4px 10px;border-radius:4px;border:1px solid;cursor:pointer;background:transparent;transition:all .15s;margin-right:4px}
  .action-btn.activate{color:var(--green);border-color:rgba(0,230,118,.3)}
  .action-btn.activate:hover{background:rgba(0,230,118,.15)}
  .action-btn.deactivate{color:var(--red);border-color:rgba(255,64,96,.3)}
  .action-btn.deactivate:hover{background:rgba(255,64,96,.12)}
  .action-btn.del{color:var(--text-3);border-color:var(--border)}
  .action-btn.del:hover{color:var(--red);border-color:rgba(255,64,96,.3)}
  .action-btn:disabled{opacity:.35;cursor:default}
  .empty{text-align:center;padding:48px;color:var(--text-3);font-size:.85rem}
  .refresh-btn{font-family:var(--mono);font-size:.62rem;padding:5px 12px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--cyan);cursor:pointer;letter-spacing:.06em}
  .refresh-btn:hover{background:rgba(0,229,204,.08)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="vk-logo">Vault<span>Keepers</span></div>
    <div class="vk-sub">Staff Access Only</div>
    <div class="lfield">
      <label>Access Key</label>
      <input type="password" id="pw" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Enter</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="vk-brand">Vault<span>Keepers</span></div>
    <div class="tb-right">
      <span class="tb-badge">STAFF</span>
      <button class="btn-sm" onclick="loadData()">↻ Refresh</button>
      <button class="btn-sm" onclick="adminLogout()">Sign Out</button>
    </div>
  </div>

  <div class="content">
    <div class="stats" id="stats"></div>
    <div class="table-header">
      <span class="section-title">All Members</span>
      <input class="search-box" id="search" placeholder="Search name or email…" oninput="filterTable()">
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th><th>Email</th><th>Status</th><th>Joined</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let allUsers = [];

async function doLogin(){
  const pw=document.getElementById('pw').value;
  const btn=document.getElementById('btn-login');
  const err=document.getElementById('lerr');
  btn.disabled=true; btn.textContent='Checking…'; err.style.display='none';
  try{
    const res=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    const data=await res.json();
    if(!data.ok){ err.textContent='Wrong access key.'; err.style.display='block'; btn.disabled=false; btn.textContent='Enter'; return; }
    document.getElementById('login-screen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadData();
  }catch{
    err.textContent='Network error.'; err.style.display='block'; btn.disabled=false; btn.textContent='Enter';
  }
}

async function adminLogout(){
  await fetch('/api/admin/logout',{method:'POST'});
  location.reload();
}

async function loadData(){
  try{
    const res=await fetch('/api/admin/users');
    if(res.status===401){ location.reload(); return; }
    const data=await res.json();
    if(!data.ok) return;
    allUsers=data.users;
    renderStats(allUsers);
    renderTable(allUsers);
  }catch(e){ console.error(e); }
}

function renderStats(users){
  const active   = users.filter(u=>u.subscriptionStatus==='active').length;
  const pending  = users.filter(u=>u.subscriptionStatus==='pending').length;
  const inactive = users.filter(u=>['inactive','cancelled'].includes(u.subscriptionStatus)).length;
  const revenue  = (active*3.99).toFixed(2);
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Total Members</div><div class="stat-val purple">${users.length}</div></div>
    <div class="stat"><div class="stat-label">Active Subscribers</div><div class="stat-val green">${active}</div><div class="stat-note">paying now</div></div>
    <div class="stat"><div class="stat-label">Pending</div><div class="stat-val gold">${pending}</div><div class="stat-note">signed up, not paid</div></div>
    <div class="stat"><div class="stat-label">Inactive / Cancelled</div><div class="stat-val red">${inactive}</div></div>
    <div class="stat"><div class="stat-label">Est. Monthly Revenue</div><div class="stat-val gold">$${revenue}</div><div class="stat-note">active × $3.99</div></div>
  `;
}

function renderTable(users){
  const tbody=document.getElementById('tbody');
  if(!users.length){ tbody.innerHTML='<tr><td colspan="5" class="empty">No members yet.</td></tr>'; return; }
  tbody.innerHTML=users.map(u=>{
    const s=u.subscriptionStatus;
    const joined=u.createdAt?new Date(u.createdAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';
    const canActivate  = s!=='active';
    const canDeactivate= s==='active';
    return `<tr>
      <td>${esc(u.name)}</td>
      <td class="mono">${esc(u.email)}</td>
      <td><span class="badge ${s}">${s}</span></td>
      <td class="mono" style="color:var(--text-3)">${joined}</td>
      <td>
        ${canActivate?`<button class="action-btn activate" onclick="setStatus('${u.id}','active')">Activate</button>`:''}
        ${canDeactivate?`<button class="action-btn deactivate" onclick="setStatus('${u.id}','inactive')">Deactivate</button>`:''}
        <button class="action-btn del" onclick="delUser('${u.id}','${esc(u.name)}')">Delete</button>
      </td>
    </tr>`;
  }).join('');
}

function filterTable(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=allUsers.filter(u=>u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q));
  renderTable(filtered);
}

async function setStatus(id, status){
  if(!confirm(`Set this user to "${status}"?`)) return;
  const res=await fetch(`/api/admin/users/${id}/status`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});
  const data=await res.json();
  if(data.ok) loadData(); else alert(data.error||'Error');
}

async function delUser(id, name){
  if(!confirm(`Permanently delete "${name}"? This cannot be undone.`)) return;
  const res=await fetch(`/api/admin/users/${id}`,{method:'DELETE'});
  const data=await res.json();
  if(data.ok) loadData(); else alert(data.error||'Error');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Check if already logged in
fetch('/api/admin/users').then(r=>{
  if(r.status===200){ document.getElementById('login-screen').style.display='none'; document.getElementById('dashboard').style.display='block'; loadData(); }
});
</script>
</body>
</html>
