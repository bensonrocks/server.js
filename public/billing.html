<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Billing — CirroSys</title>
<meta name="robots" content="noindex">
<style>
  :root{--bg:#080b11;--bg-2:#0d1119;--surface:#131926;--border:rgba(255,255,255,.09);--text:#e6ecf2;--text-2:#8b95a5;--text-3:#4f5866;--accent:#3aa0ff;--accent-2:#00d4b8;--red:#ff4d6a;--mono:'Courier New',Courier,monospace;--sans:system-ui,-apple-system,'Segoe UI',sans-serif}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:15px}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

  .topbar{background:#0a0e15;border-bottom:1px solid rgba(255,255,255,.07);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .brand{display:flex;align-items:center;gap:9px;font-size:.95rem;font-weight:800;letter-spacing:.06em;text-decoration:none}
  .brand-dot{width:9px;height:9px;border-radius:50%;background:var(--accent-2);box-shadow:0 0 8px var(--accent-2)}
  .brand-first{color:#fff}.brand-second{color:var(--accent)}
  .nav{display:flex;align-items:center;gap:2px}
  .nav a{font-size:.82rem;color:var(--text-2);padding:8px 14px;text-decoration:none;border-radius:6px;transition:color .15s,background .15s}
  .nav a:hover{color:var(--text);background:rgba(255,255,255,.05)}
  .nav a.active{color:var(--text);background:rgba(58,160,255,.12)}
  @media(max-width:760px){.nav{display:none}}

  .page{padding:28px 24px 60px;max-width:1000px;margin:0 auto}
  .page-title{font-size:1.5rem;font-weight:800;margin-bottom:4px}
  .page-sub{font-size:.85rem;color:var(--text-2);margin-bottom:28px}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
  .stat-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
  .stat-val{font-size:1.7rem;font-weight:800}
  .stat-note{font-size:.7rem;color:var(--text-3);margin-top:4px}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
  .panel-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap}
  .panel-title{font-family:var(--mono);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-2)}
  select{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:.82rem;outline:none;cursor:pointer}

  table{width:100%;border-collapse:collapse}
  th{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);text-align:left;padding:10px 16px;border-bottom:1px solid var(--border);white-space:nowrap}
  td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.84rem}
  tr:last-child td{border-bottom:none}
  .mono{font-family:var(--mono)}
  .empty{text-align:center;padding:40px 20px;color:var(--text-3);font-size:.85rem}
  .invoice-total{display:flex;justify-content:space-between;padding:16px 20px;font-weight:700;background:rgba(0,212,184,.06);border-top:1px solid var(--border)}
  .invoice-total .val{color:var(--accent-2);font-family:var(--mono)}
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="/dashboard">
    <span class="brand-dot"></span>
    <span class="brand-first">Cirro</span><span class="brand-second">Sys</span>
  </a>
  <div class="nav">
    <a href="/dashboard">Dashboard</a>
    <a class="active" href="/billing">Billing</a>
    <a href="/settings">Settings</a>
  </div>
  <div></div>
</div>

<div class="page">
  <div class="page-title">Billing</div>
  <div class="page-sub">Transparent, itemized pricing on every order — retrieve your bill monthly or as charges are incurred.</div>

  <div class="stats" id="stats"></div>

  <div class="panel">
    <div class="panel-head">
      <span class="panel-title">Monthly Invoice</span>
      <select id="month-select" onchange="loadInvoice(this.value)"></select>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Order</th><th>Date</th><th>Destination</th><th>Provider</th><th>Amount</th></tr></thead>
        <tbody id="invoice-tbody"></tbody>
      </table>
    </div>
    <div class="invoice-total"><span>Invoice Total</span><span class="val" id="invoice-total">$0.00</span></div>
  </div>

  <div class="panel">
    <div class="panel-head"><span class="panel-title">As-Incurred Ledger (All Orders)</span></div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>Order</th><th>Date</th><th>Destination</th><th>Status</th><th>Amount</th></tr></thead>
        <tbody id="ledger-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function money(n){ return '$' + Number(n||0).toFixed(2); }
function fmtDate(iso){ return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function monthLabel(key){ const [y,m]=key.split('-'); return new Date(y,m-1,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'}); }

fetch('/api/auth/me').then(r=>r.json()).then(d=>{ if(!d.user) location.href='/login'; });

async function loadSummary(){
  const res = await fetch('/api/billing/summary');
  const data = await res.json();
  if(!data.ok) return;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">This Month</div><div class="stat-val">${money(data.currentMonth.total)}</div><div class="stat-note">${data.currentMonth.count} orders</div></div>
    <div class="stat"><div class="stat-label">Lifetime</div><div class="stat-val">${money(data.lifetime.total)}</div><div class="stat-note">${data.lifetime.count} orders</div></div>
  `;

  const select = document.getElementById('month-select');
  const now = new Date();
  const currentKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const months = data.months.length ? data.months.map(m=>m.month) : [currentKey];
  if(!months.includes(currentKey)) months.unshift(currentKey);
  select.innerHTML = months.map(m=>`<option value="${m}">${monthLabel(m)}</option>`).join('');
  loadInvoice(months[0]);
  loadLedger();
}

async function loadInvoice(month){
  const res = await fetch(`/api/billing/invoice/${month}`);
  const data = await res.json();
  if(!data.ok) return;
  const tbody = document.getElementById('invoice-tbody');
  if(!data.orders.length){
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No orders in this billing period.</td></tr>';
  } else {
    tbody.innerHTML = data.orders.map(o=>`
      <tr>
        <td class="mono">${esc(o.id.slice(0,8))}</td>
        <td>${fmtDate(o.createdAt)}</td>
        <td>${esc(o.city)}, ${esc(o.country)}</td>
        <td>${esc(o.providerName||'—')}</td>
        <td class="mono">${money(o.priceTotal)}</td>
      </tr>
    `).join('');
  }
  document.getElementById('invoice-total').textContent = money(data.total);
}

async function loadLedger(){
  const res = await fetch('/api/orders');
  const data = await res.json();
  if(!data.ok) return;
  const tbody = document.getElementById('ledger-tbody');
  if(!data.orders.length){
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No charges yet.</td></tr>';
    return;
  }
  tbody.innerHTML = data.orders.map(o=>`
    <tr>
      <td class="mono">${esc(o.id.slice(0,8))}</td>
      <td>${fmtDate(o.createdAt)}</td>
      <td>${esc(o.city)}, ${esc(o.country)}</td>
      <td style="text-transform:capitalize">${esc(o.status)}</td>
      <td class="mono">${money(o.priceTotal)}</td>
    </tr>
  `).join('');
}

loadSummary();
</script>
</body>
</html>
