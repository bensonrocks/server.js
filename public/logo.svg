<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 560" role="img" aria-label="VaultSignals">
  <defs>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8C6010"/>
      <stop offset="28%"  stop-color="#D4940C"/>
      <stop offset="52%"  stop-color="#F5C842"/>
      <stop offset="76%"  stop-color="#D09820"/>
      <stop offset="100%" stop-color="#8C6010"/>
    </linearGradient>
    <linearGradient id="gh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8C6010"/>
      <stop offset="50%"  stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#8C6010"/>
    </linearGradient>
    <linearGradient id="gw" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C8C4BC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="560" fill="#09090C"/>

  <!-- ── Vault ring ── -->
  <!-- Outer glow ring -->
  <circle cx="250" cy="215" r="148" fill="none" stroke="#C8901A" stroke-width="2" opacity="0.25"/>
  <!-- Main ring -->
  <circle cx="250" cy="215" r="143" fill="none" stroke="url(#gd)" stroke-width="20"/>
  <!-- Inner ring edge highlight -->
  <circle cx="250" cy="215" r="132" fill="none" stroke="#F5C842" stroke-width="1" opacity="0.2"/>

  <!-- ── Ring bolts ── -->
  <circle cx="250" cy="72"  r="7.5" fill="url(#gd)"/>
  <circle cx="250" cy="72"  r="3.5" fill="#0A0A0C"/>
  <circle cx="375" cy="103" r="6.5" fill="url(#gd)"/>
  <circle cx="375" cy="103" r="3"   fill="#0A0A0C"/>
  <circle cx="125" cy="103" r="6.5" fill="url(#gd)"/>
  <circle cx="125" cy="103" r="3"   fill="#0A0A0C"/>

  <!-- ── Left-side vault hinges ── -->
  <!-- Top hinge pair -->
  <rect x="90" y="168" width="26" height="11" rx="4" fill="url(#gd)"/>
  <rect x="90" y="183" width="26" height="11" rx="4" fill="url(#gd)"/>
  <!-- Bottom hinge pair -->
  <rect x="90" y="238" width="26" height="11" rx="4" fill="url(#gd)"/>
  <rect x="90" y="253" width="26" height="11" rx="4" fill="url(#gd)"/>

  <!-- Door-edge arc on left -->
  <path d="M 115 140 A 138 138 0 0 0 115 290"
        fill="none" stroke="url(#gd)" stroke-width="3" opacity="0.45"/>

  <!-- ── Left candlestick bars ── -->
  <!-- Left bar (taller) -->
  <rect x="148" y="126" width="11" height="60" rx="3" fill="url(#gd)"/>
  <!-- Left bar wick top -->
  <rect x="152" y="114" width="3"  height="14" rx="1.5" fill="url(#gd)" opacity="0.7"/>
  <!-- Left bar wick bottom -->
  <rect x="152" y="186" width="3"  height="12" rx="1.5" fill="url(#gd)" opacity="0.7"/>

  <!-- Right of left-bar (shorter) -->
  <rect x="130" y="145" width="11" height="38" rx="3" fill="url(#gd)" opacity="0.75"/>
  <rect x="134" y="136" width="3"  height="11" rx="1.5" fill="url(#gd)" opacity="0.55"/>
  <rect x="134" y="183" width="3"  height="10" rx="1.5" fill="url(#gd)" opacity="0.55"/>

  <!-- ── V letterform ── -->
  <!-- V left arm -->
  <line x1="180" y1="112" x2="250" y2="300"
        stroke="url(#gd)" stroke-width="30" stroke-linecap="round"/>
  <!-- V right arm -->
  <line x1="320" y1="112" x2="250" y2="300"
        stroke="url(#gd)" stroke-width="30" stroke-linecap="round"/>
  <!-- Serif top-left -->
  <rect x="163" y="110" width="36" height="10" rx="4" fill="url(#gd)"/>
  <!-- Serif top-right -->
  <rect x="301" y="110" width="36" height="10" rx="4" fill="url(#gd)"/>

  <!-- ── Right candlestick bars ── -->
  <!-- Tall bar (further right) -->
  <rect x="358" y="105" width="11" height="88" rx="3" fill="url(#gd)"/>
  <rect x="362" y="95"  width="3"  height="12" rx="1.5" fill="url(#gd)" opacity="0.7"/>
  <rect x="362" y="193" width="3"  height="13" rx="1.5" fill="url(#gd)" opacity="0.7"/>
  <!-- Shorter bar (nearer V) -->
  <rect x="341" y="122" width="11" height="62" rx="3" fill="url(#gd)" opacity="0.75"/>
  <rect x="345" y="112" width="3"  height="12" rx="1.5" fill="url(#gd)" opacity="0.55"/>
  <rect x="345" y="184" width="3"  height="12" rx="1.5" fill="url(#gd)" opacity="0.55"/>

  <!-- ── VAULT wordmark ── -->
  <text x="250" y="418"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="76" font-weight="bold" letter-spacing="13"
        fill="url(#gw)">VAULT</text>

  <!-- Bullish triangle accent (under A apex) -->
  <polygon points="261,425 271,442 251,442" fill="url(#gd)"/>

  <!-- ── SIGNALS line ── -->
  <line x1="80"  y1="460" x2="168" y2="460" stroke="url(#gh)" stroke-width="1.5"/>
  <line x1="332" y1="460" x2="420" y2="460" stroke="url(#gh)" stroke-width="1.5"/>
  <text x="250" y="480"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="21" letter-spacing="9"
        fill="url(#gh)">SIGNALS</text>
</svg>
