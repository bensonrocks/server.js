<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Track Your Order — IdealOne Transport</title>
<link rel="icon" href="/brand/idealone-logo-sm.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{background:#f1f5f9;color:#0f172a;min-height:100vh}
.topbar{background:#0f172a;color:#fff;padding:14px 18px;font-size:15px;font-weight:800}
.topbar span{color:#60a5fa}
.wrap{max-width:560px;margin:0 auto;padding:22px 16px}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:14px}
h1{font-size:19px;margin-bottom:4px}
.sub{font-size:13px;color:#64748b;margin-bottom:16px}
.search{display:flex;gap:8px}
.search input{flex:1;padding:11px 13px;border:1.5px solid #cbd5e1;border-radius:9px;font-size:15px}
.search input:focus{outline:none;border-color:#2563eb}
.search button{padding:11px 20px;border:none;border-radius:9px;background:#1d4ed8;color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.err{color:#dc2626;font-size:13px;font-weight:600;margin-top:10px;display:none}
.ord-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ord-row .oid{font-size:16px;font-weight:800;flex:1}
.chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.st-pending,.st-confirmed{background:#dbeafe;color:#1e40af}
.st-processing,.st-packed{background:#ede9fe;color:#5b21b6}
.st-shipped{background:#fef3c7;color:#92400e}
.st-delivered{background:#dcfce7;color:#166534}
.st-cancelled,.st-returned,.st-failed{background:#fee2e2;color:#991b1b}
.driver-line{font-size:13px;color:#475569;margin-bottom:16px}
.driver-line b{color:#0f172a}
/* timeline */
.tl{list-style:none}
.tl li{position:relative;padding:0 0 22px 30px}
.tl li:last-child{padding-bottom:0}
.tl li::before{content:'';position:absolute;left:8px;top:20px;bottom:0;width:2px;background:#e2e8f0}
.tl li:last-child::before{display:none}
.tl .dot{position:absolute;left:1px;top:2px;width:16px;height:16px;border-radius:50%;background:#e2e8f0;border:3px solid #fff;box-shadow:0 0 0 1.5px #cbd5e1}
.tl li.done .dot{background:#16a34a;box-shadow:0 0 0 1.5px #16a34a}
.tl li.bad .dot{background:#dc2626;box-shadow:0 0 0 1.5px #dc2626}
.tl .t{font-size:14px;font-weight:700}
.tl li:not(.done):not(.bad) .t{color:#94a3b8;font-weight:600}
.tl .d{font-size:12px;color:#64748b;margin-top:2px}
</style>
</head>
<body>
<div class="topbar" style="display:flex;align-items:center;gap:10px">
  <img src="/brand/idealone-logo-sm.png" alt="IdealOne" style="width:32px;height:32px;border-radius:7px;background:#fff;padding:3px;box-sizing:border-box">
  <div style="line-height:1.05">IDEALONE<div style="font-size:9px;letter-spacing:3.5px;color:#60a5fa;font-weight:800;margin-top:1px">TRANSPORT</div></div>
  <span style="margin-left:auto;font-size:11px;color:#94a3b8;font-weight:700;letter-spacing:1px">LIVE TRACKING</span>
</div>
<div class="wrap">
  <div class="card">
    <h1>Track your order</h1>
    <div class="sub">Enter your tracking number (or order number) to see delivery progress.</div>
    <div class="search">
      <input id="oid" placeholder="e.g. IDL-8M3K-P2XWQ" onkeydown="if(event.key==='Enter')go()">
      <button onclick="go()">Track</button>
    </div>
    <div class="err" id="err"></div>
  </div>
  <div class="card" id="result" style="display:none"></div>
</div>

<script>
'use strict';
const $ = id => document.getElementById(id);
const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt = s => s ? new Date(s.includes('T') ? s : s.replace(' ', 'T') + 'Z').toLocaleString() : '';

async function go() {
  $('err').style.display = 'none';
  $('result').style.display = 'none';
  const id = $('oid').value.trim();
  if (!id) return;
  try {
    const r = await fetch('/api/track/' + encodeURIComponent(id));
    if (!r.ok) throw new Error(r.status === 404 ? 'Order not found — check the order number' : 'Could not fetch tracking info');
    render(await r.json());
  } catch (e) {
    $('err').textContent = e.message;
    $('err').style.display = 'block';
  }
}

function render(t) {
  const d = t.delivery;
  const steps = [
    { key: 'placed',    label: 'Order placed',      at: t.orderDate,       done: true },
    { key: 'assigned',  label: 'Driver assigned',   at: d?.assignedAt,     done: !!d },
    { key: 'picked_up', label: 'Picked up',         at: d?.pickedUpAt,     done: !!d?.pickedUpAt },
    { key: 'in_transit',label: 'Out for delivery',  at: d?.inTransitAt,    done: !!d?.inTransitAt },
  ];
  if (d?.status === 'failed') {
    steps.push({ key: 'failed', label: 'Delivery attempt failed', at: d.failedAt, done: true, bad: true,
      note: d.failedReason ? 'Reason: ' + d.failedReason : '' });
  } else {
    steps.push({ key: 'delivered', label: 'Delivered', at: d?.deliveredAt, done: !!d?.deliveredAt,
      note: d?.podName ? 'Received by ' + d.podName : '' });
  }
  const drv = d?.driver;
  $('result').innerHTML = `
    <div class="ord-row">
      <div class="oid">${esc(t.orderId)}</div>
      <span class="chip st-${esc(t.orderStatus)}">${esc(t.orderStatus)}</span>
    </div>
    ${t.trackingCode ? `<div style="font-size:12px;color:#64748b;margin:-8px 0 14px">Tracking no: <b style="font-family:monospace">${esc(t.trackingCode)}</b></div>` : ''}
    ${drv ? `<div class="driver-line">Courier: <b>${esc(drv.firstName)}</b>${drv.vehicle ? ' · ' + esc(drv.vehicle) : ''}${drv.plate ? ' · ' + esc(drv.plate) : ''}</div>` : ''}
    <ul class="tl">
      ${steps.map(s => `<li class="${s.bad ? 'bad' : s.done ? 'done' : ''}">
        <span class="dot"></span>
        <div class="t">${esc(s.label)}</div>
        <div class="d">${s.at && s.done ? esc(fmt(s.at)) : ''}${s.note ? (s.at ? ' — ' : '') + esc(s.note) : ''}</div>
      </li>`).join('')}
    </ul>`;
  $('result').style.display = '';
}

const qs = new URLSearchParams(location.search).get('order');
if (qs) { $('oid').value = qs; go(); }
</script>
</body>
</html>
