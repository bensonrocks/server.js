<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign In — VaultSignals</title>
<link rel="icon" type="image/svg+xml" href="/logo-icon.svg">
<meta name="robots" content="noindex, follow">
<style>
  :root{--bg:#08090d;--bg-2:#0d0f16;--surface:#181b24;--border:rgba(255,255,255,.09);--text:#e8e4dc;--text-2:#9a9490;--text-3:#5a5650;--cyan:#00e5cc;--green:#00e676;--red:#ff4060;--mono:'Courier New',Courier,monospace;--sans:system-ui,-apple-system,'Segoe UI',sans-serif}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:15px}body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column}
  .topbar{background:#0d0f14;border-bottom:1px solid rgba(255,255,255,.07);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:9px;font-size:.9rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;text-decoration:none}
  .brand-dot{width:9px;height:9px;border-radius:50%;background:#00e676;box-shadow:0 0 8px #00e676}
  .brand-first{color:#fff}.brand-second{color:#00e5cc}
  .tb-link{font-family:var(--mono);font-size:.7rem;letter-spacing:.07em;color:rgba(255,255,255,.5);padding:5px 10px;text-decoration:none;transition:color .15s}
  .tb-link:hover{color:rgba(255,255,255,.9)}
  .center{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px 36px;width:100%;max-width:400px}
  .card-title{font-size:1.4rem;font-weight:700;margin-bottom:6px}
  .card-sub{font-size:.85rem;color:var(--text-2);margin-bottom:28px}
  .field{margin-bottom:18px}
  label{display:block;font-family:var(--mono);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-2);margin-bottom:7px}
  input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:11px 14px;color:var(--text);font-size:.9rem;font-family:var(--sans);outline:none;transition:border-color .15s}
  input:focus{border-color:var(--cyan)}
  .btn-submit{width:100%;background:var(--green);color:#000;font-weight:700;font-size:.95rem;padding:13px;border-radius:6px;border:none;cursor:pointer;margin-top:8px;transition:opacity .15s}
  .btn-submit:hover{opacity:.85}
  .btn-submit:disabled{opacity:.5;cursor:default}
  .error{background:rgba(255,64,96,.1);border:1px solid rgba(255,64,96,.3);border-radius:6px;padding:10px 14px;font-size:.82rem;color:var(--red);margin-bottom:16px;display:none}
  .footer-link{margin-top:20px;text-align:center;font-size:.82rem;color:var(--text-2)}
  .footer-link a{color:var(--cyan);text-decoration:none}
  .footer-link a:hover{text-decoration:underline}
  @media(max-width:420px){
    .card{padding:28px 20px}
    .center{padding:24px 16px}
    input{font-size:16px}
  }
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="/">
    <img src="/logo-icon.svg" alt="" width="28" height="28" style="border-radius:5px;flex-shrink:0">
    <span class="brand-first">Vault</span><span class="brand-second">Signals</span>
  </a>
  <a class="tb-link" href="/signup">No account? Sign up →</a>
</div>

<div class="center">
  <div class="card">
    <div style="text-align:center;margin-bottom:18px">
      <img src="/logo.svg" alt="VaultSignals" width="100" height="112" style="filter:drop-shadow(0 0 16px rgba(245,200,66,.15))">
    </div>
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access your Gold &amp; Silver signals.</div>
    <div class="error" id="err"></div>
    <form id="form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button class="btn-submit" type="submit" id="btn">Sign In</button>
    </form>
    <div class="footer-link">Don't have an account? <a href="/signup">Sign up</a></div>
  </div>
</div>

<div style="position:fixed;bottom:18px;width:100%;text-align:center">
  <a href="/vaultkeepers" style="font-family:'Courier New',monospace;font-size:.6rem;letter-spacing:.14em;color:rgba(255,255,255,.12);text-decoration:none;text-transform:uppercase;transition:color .2s" onmouseover="this.style.color='rgba(255,255,255,.35)'" onmouseout="this.style.color='rgba(255,255,255,.12)'">Staff Access</a>
</div>

<script>
// Already logged in?
fetch('/api/auth/me').then(r=>r.json()).then(d=>{
  if(d.user && d.user.subscriptionStatus==='active') location.href='/dashboard';
});

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  btn.disabled=true; btn.textContent='Signing in…'; err.style.display='none';
  try {
    const res = await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
    const data = await res.json();
    if (!data.ok) { err.textContent=data.error; err.style.display='block'; btn.disabled=false; btn.textContent='Sign In'; return; }
    if (data.user.subscriptionStatus==='active') location.href='/dashboard';
    else location.href='/signup?reason=payment';
  } catch {
    err.textContent='Network error — please try again.'; err.style.display='block';
    btn.disabled=false; btn.textContent='Sign In';
  }
});
</script>
</body>
</html>
