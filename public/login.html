<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign In — CirroSys</title>
<meta name="robots" content="noindex, follow">
<link rel="stylesheet" href="/theme.css">
<style>
  body{ display: flex; flex-direction: column; }
  .center{ flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
  .login-card{ width: 100%; max-width: 400px; }
  .card-title{ font-family: var(--serif); font-size: 1.5rem; margin-bottom: 6px; }
  .card-sub{ font-size: .85rem; color: var(--text-2); margin-bottom: 28px; }
  .btn-submit{ width: 100%; margin-top: 8px; }
  .footer-link{ margin-top: 20px; text-align: center; font-size: .84rem; color: var(--text-2); }
  .ops-link{ position: fixed; bottom: 20px; width: 100%; text-align: center; }
  .ops-link a{ font-family: var(--mono); font-size: .62rem; letter-spacing: .1em; color: var(--text-3); text-decoration: none; text-transform: uppercase; }
  .ops-link a:hover{ color: var(--text-2); }
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="/">
    <span class="brand-mark"></span>
    Cirro<em>Sys</em>
  </a>
  <a class="btn-sm" href="/signup">New client? Sign up →</a>
</div>

<div class="center">
  <div class="login-card card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your CirroSys client portal.</div>
    <div class="error" id="err"></div>
    <form id="form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button class="btn-primary btn-submit" type="submit" id="btn">Sign In</button>
    </form>
    <div class="footer-link">Don't have an account? <a href="/signup">Sign up</a></div>
  </div>
</div>

<div class="ops-link"><a href="/ops-console">Ops Access</a></div>

<script>
fetch('/api/auth/me').then(r=>r.json()).then(d=>{
  if(d.user) location.href='/dashboard';
});

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  btn.disabled=true; btn.textContent='Signing in…'; err.style.display='none';
  try {
    const res = await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
    const data = await res.json();
    if (!data.ok) { err.textContent=data.error; err.style.display='block'; btn.disabled=false; btn.textContent='Sign In'; return; }
    location.href='/dashboard';
  } catch {
    err.textContent='Network error — please try again.'; err.style.display='block';
    btn.disabled=false; btn.textContent='Sign In';
  }
});
</script>
</body>
</html>
