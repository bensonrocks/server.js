<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="VaultSignals">
  <defs>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8C6010"/>
      <stop offset="40%"  stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#8C6010"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="#09090C" rx="12"/>
  <!-- Ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#gd)" stroke-width="5"/>
  <!-- Bolt -->
  <circle cx="50" cy="12" r="2.5" fill="url(#gd)"/>
  <!-- Hinges -->
  <rect x="9" y="41" width="8" height="3.5" rx="1.5" fill="url(#gd)"/>
  <rect x="9" y="48" width="8" height="3.5" rx="1.5" fill="url(#gd)"/>
  <!-- Left candle -->
  <rect x="26" y="28" width="3.5" height="20" rx="1.5" fill="url(#gd)"/>
  <!-- V -->
  <line x1="34" y1="24" x2="50" y2="66" stroke="url(#gd)" stroke-width="8" stroke-linecap="round"/>
  <line x1="66" y1="24" x2="50" y2="66" stroke="url(#gd)" stroke-width="8" stroke-linecap="round"/>
  <!-- Right candles -->
  <rect x="70" y="22" width="3.5" height="28" rx="1.5" fill="url(#gd)"/>
  <rect x="76" y="27" width="3.5" height="20" rx="1.5" fill="url(#gd)" opacity="0.7"/>
</svg>
