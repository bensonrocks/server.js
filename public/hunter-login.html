<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>IdealOne.Hunter — Staff sign in</title>
<style>
  :root { --brand: #1B6BE8; --ink: #111827; --ink-2: #4B5563; --line: #E5E7EB; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #F5F6F8; color: var(--ink);
    font: 15px/1.5 -apple-system, "Segoe UI", Roboto, Arial, Helvetica, sans-serif;
  }
  .card {
    background: #fff; border: 1px solid var(--line); border-radius: 16px;
    padding: 36px 34px 30px; width: 360px; max-width: calc(100vw - 32px);
    box-shadow: 0 10px 30px rgba(17, 24, 39, .06); text-align: center;
  }
  .card img { height: 150px; margin-bottom: 6px; }
  h1 { font-size: 18px; margin: 0 0 2px; }
  .sub { color: var(--ink-2); font-size: 13px; margin-bottom: 22px; }
  input {
    width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 11px 13px;
    font: inherit; margin-bottom: 10px; background: #FDFDFD;
  }
  input:focus { outline: 2px solid var(--brand); outline-offset: -1px; border-color: var(--brand); }
  button {
    width: 100%; background: var(--brand); color: #fff; border: none; border-radius: 9px;
    padding: 12px; font: 700 15px inherit; cursor: pointer; margin-top: 4px;
  }
  button:hover { background: #1557BE; }
  .err { color: #B91C1C; font-size: 13px; min-height: 20px; margin: 8px 0 0; font-weight: 600; }
  footer { margin-top: 18px; color: #9CA3AF; font-size: 12px; }
</style>
</head>
<body>
  <form class="card" id="form">
    <img src="/hunter-logo.svg" alt="IdealOne.Hunter">
    <h1>Staff sign in</h1>
    <div class="sub">IdealOne.Hunter · Lead Intelligence</div>
    <input type="text" id="email" placeholder="Email or username" autocomplete="username" required>
    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
    <button type="submit">Sign in</button>
    <div class="err" id="err"></div>
    <footer>Access is logged. Staff accounts are created by an administrator.<br>
      New company? <a href="/hunter/signup" style="color:var(--brand);text-decoration:none">Create an account</a>
      &nbsp;·&nbsp; <a href="/hunter/welcome" style="color:var(--ink-2);text-decoration:none">About Hunter</a></footer>
  </form>
<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  err.textContent = '';
  const r = await fetch('/api/hunter/auth/login', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
    }),
  });
  const data = await r.json();
  if (data.ok) location.href = '/hunter';
  else err.textContent = data.error || 'Sign in failed';
});
</script>
</body>
</html>
