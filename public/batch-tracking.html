<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Batch Lifecycle Tracking</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#0f172a;font-size:14px}
    .header{background:#0f172a;color:#fff;padding:16px 20px;border-bottom:2px solid #fb923c;display:flex;align-items:center;justify-content:space-between}
    .header h1{font-size:18px;font-weight:900}
    .nav{display:flex;gap:12px}
    .nav a{color:#94a3b8;text-decoration:none;padding:6px 12px;border-radius:6px;font-size:13px;transition:all .15s}
    .nav a:hover{background:#1e293b;color:#fff}
    .nav a.active{background:#1e293b;color:#fff}
    .container{max-width:1400px;margin:0 auto;padding:20px}
    .card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;border:1px solid #e2e8f0}
    .card-header{background:#f8fafc;padding:16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .card-header h2{font-size:15px;font-weight:700}
    .card-body{padding:16px}
    .search-box{display:flex;gap:8px;flex:1;min-width:250px}
    .search-box input{padding:8px 12px;border:1px solid #e2e8f0;border-radius:6px;flex:1;font-size:13px}
    .btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
    .btn-primary{background:#f59e0b;color:#fff}
    .btn-primary:hover{background:#d97706}
    .btn-secondary{background:#e2e8f0;color:#0f172a}
    .btn-secondary:hover{background:#cbd5e1}
    .table{width:100%;border-collapse:collapse;font-size:13px}
    .table th{background:#f8fafc;padding:10px;text-align:left;font-weight:700;border-bottom:1.5px solid #e2e8f0;font-size:11px;color:#64748b}
    .table td{padding:10px;border-bottom:1px solid #f1f5f9}
    .table tr:hover{background:#f8fafc}
    .badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}
    .badge-received{background:#dbeafe;color:#1e40af}
    .badge-available{background:#dcfce7;color:#166534}
    .badge-allocated{background:#fef08a;color:#854d0e}
    .badge-picked{background:#fce7f3;color:#831843}
    .badge-expired{background:#fee2e2;color:#991b1b}
    .batch-timeline{margin:16px 0;padding:16px;background:#f8fafc;border-radius:6px}
    .timeline-step{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
    .timeline-step:last-child{margin-bottom:0}
    .timeline-dot{width:12px;height:12px;border-radius:50%;background:#f59e0b;margin-top:4px;flex-shrink:0}
    .timeline-dot.done{background:#16a34a}
    .timeline-content{flex:1;font-size:12px}
    .timeline-label{font-weight:600;color:#0f172a}
    .timeline-time{color:#64748b;font-size:11px;margin-top:2px}
    .expiry-alert{padding:8px 12px;border-radius:6px;background:#fee2e2;color:#991b1b;font-size:12px;margin-top:8px}
    .loading{text-align:center;padding:20px;color:#94a3b8}
    .error{background:#fee2e2;color:#991b1b;padding:12px;border-radius:6px;margin-bottom:16px}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
    .modal.show{display:flex}
    .modal-content{background:#fff;border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:90vh;overflow-y:auto}
    .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:24px;cursor:pointer;color:#64748b}
  </style>
</head>
<body>
  <div class="header">
    <h1>Batch Lifecycle Tracking</h1>
    <div class="nav">
      <a href="portal.html">Orders</a>
      <a href="warehouse-dashboard.html">Inventory</a>
      <a href="batch-tracking.html" class="active">Batches</a>
      <a href="customs-tracking.html">Customs</a>
    </div>
  </div>

  <div class="container">
    <div id="error" class="error" style="display:none;"></div>

    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <div class="search-box">
          <input type="text" id="searchBatch" placeholder="Search batch number, SKU, or warehouse..." onkeyup="searchBatches()">
        </div>
        <button class="btn btn-primary" onclick="refreshBatches()">Refresh</button>
      </div>
      <div class="card-body" id="batchList">
        <div class="loading">Loading batches...</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Batch Statistics</h2>
      </div>
      <div class="card-body" id="batchStats">
        <div class="loading">Loading statistics...</div>
      </div>
    </div>
  </div>

  <div id="detailModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    let allBatches = [];

    function showError(msg) {
      document.getElementById('error').textContent = msg;
      document.getElementById('error').style.display = 'block';
    }

    function clearError() {
      document.getElementById('error').style.display = 'none';
    }

    async function refreshBatches() {
      clearError();
      try {
        // Fetch all warehouse stats to get batch info
        const res = await fetch('/api/warehouse/stats', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to load batches');
        const data = await res.json();
        allBatches = data.batches || [];
        renderBatches(allBatches);
        renderStats();
      } catch (e) {
        showError(e.message);
      }
    }

    function renderBatches(batches) {
      if (!batches || batches.length === 0) {
        document.getElementById('batchList').innerHTML = '<p style="color:#94a3b8">No batches found</p>';
        return;
      }

      const html = `
        <table class="table">
          <tr>
            <th>Batch Number</th>
            <th>SKU</th>
            <th>Warehouse</th>
            <th>Qty Available</th>
            <th>Status</th>
            <th>Expiry</th>
            <th>Action</th>
          </tr>
          ${batches.map(batch => {
            const today = new Date();
            const expiry = batch.expiryDate ? new Date(batch.expiryDate) : null;
            let expiryStatus = '';
            if (expiry && expiry < today) {
              expiryStatus = '<span class="badge badge-expired">EXPIRED</span>';
            } else if (expiry) {
              const daysLeft = Math.floor((expiry - today) / (1000 * 60 * 60 * 24));
              if (daysLeft <= 30) {
                expiryStatus = `<span class="badge badge-expired">Expires in ${daysLeft}d</span>`;
              } else {
                expiryStatus = `<span style="color:#64748b;font-size:11px">${daysLeft}d</span>`;
              }
            } else {
              expiryStatus = '<span style="color:#64748b;font-size:11px">No expiry</span>';
            }

            return `
              <tr>
                <td><strong>${batch.batchNumber || batch.id}</strong></td>
                <td>${batch.skuId || 'N/A'}</td>
                <td>${batch.warehouseId || 'N/A'}</td>
                <td><span class="badge badge-available">${batch.availableQty || 0}</span></td>
                <td>
                  ${batch.pickedQty > 0 ? '<span class="badge badge-picked">Picking</span>' : ''}
                  ${batch.allocatedQty > 0 ? '<span class="badge badge-allocated">Allocated</span>' : ''}
                  ${batch.availableQty > 0 && batch.allocatedQty === 0 && batch.pickedQty === 0 ? '<span class="badge badge-available">Available</span>' : ''}
                </td>
                <td>${expiryStatus}</td>
                <td><button class="btn btn-secondary" onclick="viewBatchDetail('${batch.id}')">View</button></td>
              </tr>
            `;
          }).join('')}
        </table>
      `;
      document.getElementById('batchList').innerHTML = html;
    }

    function renderStats() {
      const totalBatches = allBatches.length;
      const totalQty = allBatches.reduce((sum, b) => sum + (b.totalQty || 0), 0);
      const availableQty = allBatches.reduce((sum, b) => sum + (b.availableQty || 0), 0);
      const allocatedQty = allBatches.reduce((sum, b) => sum + (b.allocatedQty || 0), 0);
      const pickedQty = allBatches.reduce((sum, b) => sum + (b.pickedQty || 0), 0);
      const expiredBatches = allBatches.filter(b => {
        const expiry = b.expiryDate ? new Date(b.expiryDate) : null;
        return expiry && expiry < new Date();
      }).length;

      const html = `
        <table class="table" style="font-size:13px">
          <tr>
            <td>Total Batches</td>
            <td><strong>${totalBatches}</strong></td>
          </tr>
          <tr>
            <td>Total Quantity</td>
            <td><strong>${totalQty}</strong></td>
          </tr>
          <tr>
            <td>Available</td>
            <td><span class="badge badge-available">${availableQty}</span></td>
          </tr>
          <tr>
            <td>Allocated</td>
            <td><span class="badge badge-allocated">${allocatedQty}</span></td>
          </tr>
          <tr>
            <td>Picked</td>
            <td><span class="badge badge-picked">${pickedQty}</span></td>
          </tr>
          <tr>
            <td>Expired Batches</td>
            <td><span class="badge badge-expired">${expiredBatches}</span></td>
          </tr>
        </table>
      `;
      document.getElementById('batchStats').innerHTML = html;
    }

    function searchBatches() {
      const query = document.getElementById('searchBatch').value.toLowerCase();
      const filtered = allBatches.filter(b =>
        (b.batchNumber && b.batchNumber.toLowerCase().includes(query)) ||
        (b.skuId && b.skuId.toLowerCase().includes(query)) ||
        (b.warehouseId && b.warehouseId.toLowerCase().includes(query))
      );
      renderBatches(filtered);
    }

    function viewBatchDetail(batchId) {
      const batch = allBatches.find(b => b.id === batchId);
      if (!batch) return;

      const expiry = batch.expiryDate ? new Date(batch.expiryDate) : null;
      const daysLeft = expiry ? Math.floor((expiry - new Date()) / (1000 * 60 * 60 * 24)) : null;

      const html = `
        <h2>${batch.batchNumber || batch.id}</h2>
        <div style="margin-top:16px;font-size:13px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
            <div>
              <div style="color:#64748b;margin-bottom:4px">SKU ID</div>
              <div style="font-weight:700">${batch.skuId || 'N/A'}</div>
            </div>
            <div>
              <div style="color:#64748b;margin-bottom:4px">Serial Number</div>
              <div style="font-weight:700">${batch.serialNumber || 'N/A'}</div>
            </div>
            <div>
              <div style="color:#64748b;margin-bottom:4px">Warehouse</div>
              <div style="font-weight:700">${batch.warehouseId || 'N/A'}</div>
            </div>
            <div>
              <div style="color:#64748b;margin-bottom:4px">Location</div>
              <div style="font-weight:700">${batch.locationBin || 'N/A'}</div>
            </div>
          </div>

          <div style="background:#f8fafc;padding:12px;border-radius:6px;margin-bottom:20px">
            <div style="color:#64748b;margin-bottom:8px;font-weight:600">Quantity Breakdown</div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
              <div>
                <div style="color:#64748b;font-size:11px">Received</div>
                <div style="font-size:16px;font-weight:700">${batch.receivedQty || 0}</div>
              </div>
              <div>
                <div style="color:#64748b;font-size:11px">Available</div>
                <div style="font-size:16px;font-weight:700;color:#16a34a">${batch.availableQty || 0}</div>
              </div>
              <div>
                <div style="color:#64748b;font-size:11px">Allocated</div>
                <div style="font-size:16px;font-weight:700;color:#f59e0b">${batch.allocatedQty || 0}</div>
              </div>
              <div>
                <div style="color:#64748b;font-size:11px">Picked</div>
                <div style="font-size:16px;font-weight:700;color:#8b5cf6">${batch.pickedQty || 0}</div>
              </div>
              <div>
                <div style="color:#64748b;font-size:11px">Damaged</div>
                <div style="font-size:16px;font-weight:700;color:#dc2626">${batch.damagedQty || 0}</div>
              </div>
              <div>
                <div style="color:#64748b;font-size:11px">Scrap</div>
                <div style="font-size:16px;font-weight:700;color:#6b7280">${batch.scrapQty || 0}</div>
              </div>
            </div>
          </div>

          <div style="margin-bottom:20px">
            <div style="color:#64748b;margin-bottom:8px;font-weight:600">Expiry Information</div>
            ${expiry ? `
              <div style="background:${daysLeft <= 30 ? '#fee2e2' : '#dcfce7'};padding:12px;border-radius:6px">
                <div style="font-weight:700;color:${daysLeft <= 30 ? '#991b1b' : '#166534'}">${expiry.toLocaleDateString()}</div>
                <div style="font-size:12px;color:${daysLeft <= 30 ? '#991b1b' : '#166534'};margin-top:4px">
                  ${daysLeft < 0 ? 'EXPIRED' : daysLeft + ' days remaining'}
                </div>
              </div>
            ` : '<div style="color:#64748b">No expiry date</div>'}
          </div>

          <div>
            <div style="color:#64748b;margin-bottom:8px;font-weight:600">Timeline</div>
            <div class="batch-timeline">
              <div class="timeline-step">
                <div class="timeline-dot done"></div>
                <div class="timeline-content">
                  <div class="timeline-label">Received</div>
                  <div class="timeline-time">${batch.receivedAt || 'N/A'}</div>
                </div>
              </div>
              ${batch.allocatedQty > 0 ? `
                <div class="timeline-step">
                  <div class="timeline-dot done"></div>
                  <div class="timeline-content">
                    <div class="timeline-label">Allocated for Picking</div>
                    <div class="timeline-time">${batch.allocatedAt || 'N/A'}</div>
                  </div>
                </div>
              ` : ''}
              ${batch.pickedQty > 0 ? `
                <div class="timeline-step">
                  <div class="timeline-dot done"></div>
                  <div class="timeline-content">
                    <div class="timeline-label">Picked</div>
                    <div class="timeline-time">${batch.pickedAt || 'N/A'}</div>
                  </div>
                </div>
              ` : ''}
            </div>
          </div>
        </div>
      `;

      document.getElementById('detailContent').innerHTML = html;
      document.getElementById('detailModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('show');
    }

    window.addEventListener('load', () => {
      if (!token) {
        window.location.href = 'portal.html';
        return;
      }
      refreshBatches();
    });
  </script>
</body>
</html>
