<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>IDEALONE Driver</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0ea5e9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; color: #1e293b; }
    .hidden { display: none !important; }
    button { font-family: inherit; }

    /* ── Login ── */
    .login-wrap {
      position: fixed; inset: 0; background: linear-gradient(160deg, #0ea5e9 0%, #0369a1 100%);
      display: flex; align-items: center; justify-content: center; padding: 1.5rem; z-index: 999;
    }
    .login-box { background: #fff; border-radius: 16px; padding: 2rem 1.6rem; width: 100%; max-width: 340px; box-shadow: 0 24px 60px rgba(0,0,0,.35); }
    .login-brand { display: flex; flex-direction: column; align-items: center; margin-bottom: 1.6rem; }
    .login-brand img { width: 52px; height: 52px; border-radius: 12px; margin-bottom: .6rem; }
    .login-brand h1 { font-size: 20px; font-weight: 800; }
    .login-brand p { font-size: 12.5px; color: #64748b; margin-top: .2rem; }
    .field-label { display: block; font-size: 12.5px; font-weight: 700; color: #475569; margin-bottom: .35rem; }
    .id-input {
      width: 100%; padding: .75rem .8rem; border: 2px solid #e2e8f0; border-radius: 10px;
      font-size: 16px; margin-bottom: 1.1rem;
    }
    .id-input:focus { outline: none; border-color: #0ea5e9; }
    .pin-display {
      width: 100%; padding: .8rem; border: 2px solid #e2e8f0; border-radius: 10px;
      font-size: 20px; letter-spacing: .5em; text-align: center; font-weight: 700; margin-bottom: 1rem; color: #0f172a;
      background: #f8fafc;
    }
    .pin-keypad { display: grid; grid-template-columns: repeat(3,1fr); gap: .55rem; margin-bottom: 1rem; }
    .pin-key { padding: .95rem; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 17px; font-weight: 700; background: #f8fafc; cursor: pointer; }
    .pin-key:active { background: #0ea5e9; color: #fff; }
    .pin-key.wide { grid-column: span 1; font-size: 12.5px; }
    .login-submit {
      width: 100%; padding: .85rem; background: #0ea5e9; color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .login-submit:disabled { background: #cbd5e1; }
    .login-error { color: #dc2626; font-size: 12.5px; text-align: center; margin-top: .7rem; min-height: 1em; }

    /* ── Shell ── */
    .app { display: none; flex-direction: column; height: 100dvh; }
    .app.shown { display: flex; }
    .hdr {
      background: #0f172a; color: #fff; padding: .85rem 1rem; display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    .hdr-name { font-size: 15px; font-weight: 800; }
    .hdr-sub { font-size: 11.5px; color: #94a3b8; }
    .hdr-logout { background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25); color: #fff; padding: .4rem .75rem; border-radius: 8px; font-size: 12px; cursor: pointer; }

    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: .5rem; padding: .7rem; background: #e0f2fe; flex-shrink: 0; }
    .stat { background: #fff; border-radius: 8px; padding: .5rem; text-align: center; border: 1px solid #bae6fd; }
    .stat b { display: block; font-size: 18px; color: #0369a1; }
    .stat span { font-size: 10.5px; color: #64748b; }

    .refresh-row { display: flex; align-items: center; justify-content: space-between; padding: .5rem 1rem; font-size: 12px; color: #64748b; flex-shrink: 0; }
    .refresh-btn { background: none; border: none; color: #0ea5e9; font-weight: 700; font-size: 12.5px; cursor: pointer; }

    .list { flex: 1; overflow-y: auto; padding: .3rem .7rem 1rem; }
    .empty-state { text-align: center; color: #94a3b8; padding: 3rem 1rem; font-size: 13.5px; }

    .job-card {
      background: #fff; border-radius: 12px; padding: .9rem; margin-bottom: .6rem; border: 1px solid #e2e8f0;
      border-left: 5px solid #94a3b8; cursor: pointer;
    }
    .job-card.job-new { border-left-color: #7c3aed; background: #faf5ff; }
    .job-top { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; }
    .job-seq { font-size: 11px; color: #94a3b8; font-weight: 700; }
    .job-client { font-size: 15px; font-weight: 800; margin: .15rem 0 .25rem; }
    .job-addr { font-size: 12.5px; color: #475569; line-height: 1.35; }
    .job-pill { font-size: 10.5px; font-weight: 800; padding: .2rem .55rem; border-radius: 999px; color: #fff; white-space: nowrap; }
    .job-pill-new { font-size: 10.5px; font-weight: 800; padding: .2rem .55rem; border-radius: 999px; color: #fff; background: #7c3aed; white-space: nowrap; }
    .job-meta { display: flex; gap: .7rem; margin-top: .5rem; font-size: 11.5px; color: #64748b; }

    /* ── Detail sheet ── */
    .sheet-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.5); display: flex; align-items: flex-end; z-index: 500; }
    .sheet {
      background: #fff; width: 100%; max-height: 88vh; border-radius: 16px 16px 0 0; padding: 1.3rem 1.2rem calc(1.3rem + env(safe-area-inset-bottom));
      overflow-y: auto;
    }
    .sheet-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .sheet-title { font-size: 17px; font-weight: 800; }
    .sheet-close { background: none; border: none; font-size: 22px; color: #94a3b8; cursor: pointer; }
    .sheet-section { background: #f8fafc; border-radius: 10px; padding: .8rem .9rem; margin-bottom: .7rem; }
    .sheet-row { display: flex; justify-content: space-between; padding: .3rem 0; font-size: 13px; gap: .8rem; }
    .sheet-row span:first-child { color: #64748b; }
    .sheet-row span:last-child { font-weight: 700; text-align: right; }
    .icon-row { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; margin-top: .5rem; }
    .link-btn { display: block; width: 100%; text-align: center; padding: .7rem; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 13.5px; }
    .link-nav { background: #ede9fe; color: #6d28d9; }
    .link-call { background: #dcfce7; color: #15803d; }
    .action-btn { width: 100%; padding: .9rem; border: none; border-radius: 10px; font-size: 15px; font-weight: 800; color: #fff; cursor: pointer; margin-top: .8rem; }
    .action-btn:disabled { background: #cbd5e1 !important; cursor: not-allowed; }
    .action-accept { background: #7c3aed; }
    .action-pickup { background: #f59e0b; }
    .action-photo { background: #0ea5e9; }
    .action-deliver { background: #16a34a; }
    .sheet-done { text-align: center; color: #64748b; font-size: 12.5px; padding: .6rem; }

    /* ── ePOD (photo + GPS) ── */
    .pod-section { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px; padding: .8rem .9rem; margin-top: .7rem; }
    .pod-title { font-weight: 800; font-size: 12.5px; color: #0369a1; margin-bottom: .5rem; display: flex; justify-content: space-between; align-items: center; }
    .pod-photo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: .4rem; margin-bottom: .4rem; }
    .pod-photo-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; border: 1px solid #e2e8f0; }
    .pod-hint { font-size: 11.5px; color: #64748b; }
    .pod-location-note { font-size: 11.5px; color: #16a34a; font-weight: 700; margin-top: .4rem; }

    .toast {
      position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%); background: #0f172a; color: #fff;
      padding: .6rem 1.1rem; border-radius: 999px; font-size: 12.5px; z-index: 999; box-shadow: 0 6px 20px rgba(0,0,0,.3);
    }
    .offline-pill {
      position: fixed; top: .6rem; left: 50%; transform: translateX(-50%); background: #dc2626; color: #fff;
      padding: .35rem .9rem; border-radius: 999px; font-size: 11.5px; font-weight: 700; z-index: 998;
    }
  </style>
</head>
<body>

  <!-- ── Login ── -->
  <div id="loginWrap" class="login-wrap">
    <div class="login-box">
      <div class="login-brand">
        <img src="/brand/idealone-mark.png" alt="" />
        <h1>IDEALONE Driver</h1>
        <p>Sign in to see your deliveries</p>
      </div>
      <label class="field-label">Driver ID</label>
      <input type="text" id="driverIdInput" class="id-input" placeholder="e.g. DRV-1001" autocomplete="username" autocapitalize="none" />
      <label class="field-label">PIN</label>
      <div class="pin-display" id="pinDisplay">••••</div>
      <div class="pin-keypad">
        <button class="pin-key" data-k="1">1</button>
        <button class="pin-key" data-k="2">2</button>
        <button class="pin-key" data-k="3">3</button>
        <button class="pin-key" data-k="4">4</button>
        <button class="pin-key" data-k="5">5</button>
        <button class="pin-key" data-k="6">6</button>
        <button class="pin-key" data-k="7">7</button>
        <button class="pin-key" data-k="8">8</button>
        <button class="pin-key" data-k="9">9</button>
        <button class="pin-key wide" id="pinClearBtn">Clear</button>
        <button class="pin-key" data-k="0">0</button>
        <button class="pin-key wide" id="pinDelBtn">&#9003;</button>
      </div>
      <button id="loginBtn" class="login-submit" disabled>Sign In</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <!-- ── App shell ── -->
  <div id="app" class="app">
    <div class="hdr">
      <div>
        <div class="hdr-name" id="hdrName">—</div>
        <div class="hdr-sub" id="hdrSub">—</div>
      </div>
      <button class="hdr-logout" id="logoutBtn">Logout</button>
    </div>
    <div class="stats">
      <div class="stat"><b id="statRemaining">—</b><span>To Do</span></div>
      <div class="stat"><b id="statOnRoad">—</b><span>On Road</span></div>
      <div class="stat"><b id="statDone">—</b><span>Done Today</span></div>
    </div>
    <div class="refresh-row">
      <span id="lastRefreshed">—</span>
      <button class="refresh-btn" id="refreshBtn">&#8635; Refresh</button>
    </div>
    <div class="list" id="jobsList"></div>
  </div>

  <!-- ── Job detail sheet ── -->
  <div id="sheetOverlay" class="sheet-overlay hidden">
    <div class="sheet">
      <div class="sheet-head">
        <div>
          <div class="sheet-title" id="sheetClient">—</div>
          <div style="font-size:11.5px;color:#94a3b8;margin-top:.2rem" id="sheetId">—</div>
          <div style="font-size:11px;color:#0369a1;margin-top:.15rem;font-weight:700" id="sheetDriverLine">—</div>
        </div>
        <button class="sheet-close" id="sheetCloseBtn">&#10005;</button>
      </div>
      <div class="sheet-section">
        <div class="sheet-row"><span>Address</span><span id="sheetAddress">—</span></div>
        <div class="sheet-row"><span>Postal</span><span id="sheetZip">—</span></div>
        <div class="sheet-row"><span>PO / Ref</span><span id="sheetRef">—</span></div>
        <div class="sheet-row"><span>Cartons</span><span id="sheetPackages">—</span></div>
        <div class="icon-row">
          <a href="#" target="_blank" rel="noopener" class="link-btn link-nav" id="sheetNavLink">&#128663; Navigate</a>
          <a href="#" class="link-btn link-call hidden" id="sheetCallLink">&#128222; Call</a>
        </div>
      </div>
      <div class="sheet-section hidden" id="sheetNotesWrap">
        <div style="font-weight:700;font-size:12.5px;margin-bottom:.3rem;color:#475569">Notes</div>
        <div id="sheetNotes" style="font-size:13px"></div>
      </div>

      <button class="action-btn action-accept hidden" id="acceptBtn">&#9989; Accept Job</button>
      <button class="action-btn action-pickup hidden" id="pickupBtn">&#128230; Picked Up — On the Road</button>

      <!-- ePOD: photo (required) + GPS (best-effort, captured automatically) -->
      <div class="pod-section hidden" id="podSection">
        <div class="pod-title"><span>&#128247; Proof of Delivery</span><span id="podPhotoCount">0 photo(s)</span></div>
        <div class="pod-photo-grid" id="podPhotoGrid"></div>
        <div class="pod-hint" id="podHint">Take at least one photo before marking this delivered.</div>
        <button class="action-btn action-photo" id="podPhotoBtn" style="margin-top:.6rem">&#128247; Take Delivery Photo</button>
        <input type="file" id="podPhotoInput" accept="image/*" capture="environment" hidden />
        <div class="pod-location-note hidden" id="podLocationNote"></div>
      </div>
      <button class="action-btn action-deliver hidden" id="deliverBtn" disabled>&#10003; Mark Delivered</button>
      <div class="sheet-done hidden" id="sheetDoneNote"></div>
    </div>
  </div>

  <div id="offlinePill" class="offline-pill hidden">&#128246; Offline — will retry</div>

  <script src="driver.js" defer></script>
</body>
</html>
