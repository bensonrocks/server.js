<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Warehouse Inventory Dashboard</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#0f172a;font-size:14px}
    .header{background:#0f172a;color:#fff;padding:16px 20px;border-bottom:2px solid #fb923c;display:flex;align-items:center;justify-content:space-between}
    .header h1{font-size:18px;font-weight:900}
    .nav{display:flex;gap:12px}
    .nav a{color:#94a3b8;text-decoration:none;padding:6px 12px;border-radius:6px;font-size:13px;transition:all .15s}
    .nav a:hover{background:#1e293b;color:#fff}
    .container{max-width:1400px;margin:0 auto;padding:20px}
    .grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:20px;margin-bottom:20px}
    .card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;border:1px solid #e2e8f0}
    .card-header{background:#f8fafc;padding:16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
    .card-header h2{font-size:15px;font-weight:700}
    .card-body{padding:16px}
    .stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f1f5f9}
    .stat-row:last-child{border-bottom:none}
    .stat-label{font-size:13px;color:#64748b}
    .stat-value{font-size:16px;font-weight:700;color:#0f172a}
    .badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}
    .badge-success{background:#dcfce7;color:#166534}
    .badge-warning{background:#fef08a;color:#854d0e}
    .badge-info{background:#dbeafe;color:#1e40af}
    .badge-danger{background:#fee2e2;color:#991b1b}
    .table{width:100%;border-collapse:collapse;font-size:13px}
    .table th{background:#f8fafc;padding:10px;text-align:left;font-weight:700;border-bottom:1.5px solid #e2e8f0;font-size:11px;color:#64748b}
    .table td{padding:10px;border-bottom:1px solid #f1f5f9}
    .table tr:hover{background:#f8fafc}
    .btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
    .btn-primary{background:#f59e0b;color:#fff}
    .btn-primary:hover{background:#d97706}
    .btn-secondary{background:#e2e8f0;color:#0f172a}
    .btn-secondary:hover{background:#cbd5e1}
    .loading{text-align:center;padding:20px;color:#94a3b8}
    .error{background:#fee2e2;color:#991b1b;padding:12px;border-radius:6px;margin-bottom:16px}
    .warehouse-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:16px;margin-bottom:12px}
    .warehouse-name{font-size:14px;font-weight:700;margin-bottom:8px}
    .warehouse-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
    .stat-box{background:#f8fafc;padding:12px;border-radius:6px;text-align:center}
    .stat-box-label{font-size:11px;color:#64748b;margin-bottom:4px}
    .stat-box-value{font-size:16px;font-weight:700;color:#0f172a}
    .tabs{display:flex;gap:8px;border-bottom:1px solid #e2e8f0;margin-bottom:16px}
    .tab{padding:10px 16px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
    .tab.active{color:#0f172a;border-bottom-color:#f59e0b}
    .tab:hover{color:#0f172a}
    .expiry-soon{color:#dc2626;font-weight:600}
    .expiry-ok{color:#16a34a}
  </style>
</head>
<body>
  <div class="header">
    <h1>Warehouse Inventory Dashboard</h1>
    <div class="nav">
      <a href="portal.html">Orders</a>
      <a href="warehouse-dashboard.html" style="color:#fff;background:#1e293b">Inventory</a>
      <a href="batch-tracking.html">Batches</a>
      <a href="customs-tracking.html">Customs</a>
    </div>
  </div>

  <div class="container">
    <div id="error" class="error" style="display:none;"></div>

    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <h2>Warehouse Summary</h2>
        <button class="btn btn-primary" onclick="refreshData()">Refresh</button>
      </div>
      <div class="card-body" id="warehouseSummary">
        <div class="loading">Loading warehouses...</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Inventory by Warehouse</h2>
      </div>
      <div class="card-body">
        <div class="tabs">
          <button class="tab active" onclick="switchView('summary')">Summary</button>
          <button class="tab" onclick="switchView('detailed')">Detailed</button>
          <button class="tab" onclick="switchView('lowstock')">Low Stock</button>
        </div>
        <div id="inventoryView">
          <div class="loading">Loading inventory...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    let currentView = 'summary';

    function showError(msg) {
      document.getElementById('error').textContent = msg;
      document.getElementById('error').style.display = 'block';
    }

    function clearError() {
      document.getElementById('error').style.display = 'none';
    }

    async function refreshData() {
      clearError();
      await loadWarehouses();
      await loadInventory();
    }

    async function loadWarehouses() {
      try {
        const res = await fetch('/api/warehouse/stats', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to load warehouses');
        const data = await res.json();
        renderWarehouses(data.warehouses || []);
      } catch (e) {
        showError(e.message);
      }
    }

    function renderWarehouses(warehouses) {
      const html = warehouses.map(wh => `
        <div class="warehouse-card">
          <div class="warehouse-name">${wh.name} (${wh.location})</div>
          <div class="warehouse-stats">
            <div class="stat-box">
              <div class="stat-box-label">Total SKUs</div>
              <div class="stat-box-value">${wh.skus || 0}</div>
            </div>
            <div class="stat-box">
              <div class="stat-box-label">Total Units</div>
              <div class="stat-box-value">${wh.totalQty || 0}</div>
            </div>
            <div class="stat-box">
              <div class="stat-box-label">Available</div>
              <div class="stat-box-value" style="color:#16a34a">${wh.availableQty || 0}</div>
            </div>
          </div>
        </div>
      `).join('');
      document.getElementById('warehouseSummary').innerHTML = html || '<p>No warehouses found</p>';
    }

    async function loadInventory() {
      try {
        const res = await fetch('/api/warehouse/stats', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to load inventory');
        const data = await res.json();
        renderInventory(data.warehouses || []);
      } catch (e) {
        showError(e.message);
      }
    }

    function renderInventory(warehouses) {
      if (currentView === 'summary') {
        const html = `
          <table class="table">
            <tr>
              <th>Warehouse</th>
              <th>SKUs</th>
              <th>Available</th>
              <th>Allocated</th>
              <th>Picked</th>
              <th>Total</th>
            </tr>
            ${warehouses.map(wh => `
              <tr>
                <td><strong>${wh.name}</strong></td>
                <td>${wh.skus || 0}</td>
                <td><span class="badge badge-success">${wh.availableQty || 0}</span></td>
                <td><span class="badge badge-warning">${wh.allocatedQty || 0}</span></td>
                <td><span class="badge badge-info">${wh.pickedQty || 0}</span></td>
                <td>${wh.totalQty || 0}</td>
              </tr>
            `).join('')}
          </table>
        `;
        document.getElementById('inventoryView').innerHTML = html;
      } else if (currentView === 'detailed') {
        const html = `
          <div style="max-height:600px;overflow-y:auto">
            ${warehouses.map(wh => `
              <div style="margin-bottom:24px">
                <h3 style="margin-bottom:12px;font-size:14px;font-weight:700">${wh.name}</h3>
                <div style="font-size:12px;color:#64748b;margin-bottom:8px">Location: ${wh.location}</div>
                <table class="table" style="font-size:12px">
                  <tr>
                    <th>Metric</th>
                    <th>Count</th>
                  </tr>
                  <tr><td>Total SKUs</td><td>${wh.skus || 0}</td></tr>
                  <tr><td>Total Units</td><td>${wh.totalQty || 0}</td></tr>
                  <tr><td>Available</td><td><span class="badge badge-success">${wh.availableQty || 0}</span></td></tr>
                  <tr><td>Allocated</td><td><span class="badge badge-warning">${wh.allocatedQty || 0}</span></td></tr>
                  <tr><td>Picked</td><td><span class="badge badge-info">${wh.pickedQty || 0}</span></td></tr>
                  <tr><td>Damaged</td><td><span class="badge badge-danger">${wh.damagedQty || 0}</span></td></tr>
                </table>
              </div>
            `).join('')}
          </div>
        `;
        document.getElementById('inventoryView').innerHTML = html;
      }
    }

    function switchView(view) {
      currentView = view;
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');
      loadInventory();
    }

    window.addEventListener('load', () => {
      if (!token) {
        window.location.href = 'portal.html';
        return;
      }
      refreshData();
    });
  </script>
</body>
</html>
