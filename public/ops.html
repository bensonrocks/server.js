<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CirroSys Ops Console</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="/theme.css">
<style>
  #login-screen{ min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-card{ width: 100%; max-width: 380px; text-align: center; }
  .op-logo{ font-family: var(--serif); font-size: 1.4rem; margin-bottom: 6px; }
  .op-logo em{ font-style: normal; color: var(--accent); }
  .op-sub{ font-family: var(--mono); font-size: .68rem; color: var(--text-3); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 28px; }
  .lfield{ margin-bottom: 16px; text-align: left; }
  .btn-login{ width: 100%; margin-top: 4px; }
  .lerr{ font-size: .78rem; color: var(--danger); margin-top: 12px; display: none; }

  #dashboard{ display: none; }
  .op-topbar{ background: var(--text); color: #fff; }
  .op-topbar .brand{ color: #fff; }
  .op-topbar .brand-mark{ background: var(--accent-hover); }
  .tb-badge{ font-family: var(--mono); font-size: .6rem; letter-spacing: .1em; background: rgba(255,255,255,.12); color: #fff; padding: 3px 10px; border-radius: 4px; }
  .op-topbar .btn-sm{ color: rgba(255,255,255,.7); border-color: rgba(255,255,255,.25); }
  .op-topbar .btn-sm:hover{ color: #fff; border-color: rgba(255,255,255,.5); background: rgba(255,255,255,.08); }

  .tabs{ display: flex; gap: 2px; margin-bottom: 18px; }
  .tab-btn{ font-family: var(--mono); font-size: .72rem; letter-spacing: .06em; padding: 8px 16px; border: 1px solid var(--border-2); background: transparent; color: var(--text-2); cursor: pointer; border-radius: 6px; }
  .tab-btn.active{ color: var(--accent); background: var(--accent-soft); border-color: transparent; }
  .tab-panel{ display: none; }
  .tab-panel.active{ display: block; }

  .table-header{ display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }
  .search-box{ background: var(--surface); border: 1px solid var(--border-2); border-radius: 6px; padding: 7px 12px; color: var(--text); font-size: .82rem; outline: none; width: 220px; }
  .qty-row{ display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .qty-row select, .qty-row input{ font-size: .72rem; padding: 5px 7px; }
  .qty-row input{ width: 90px; }
  .action-btn{ font-family: var(--mono); font-size: .62rem; letter-spacing: .04em; padding: 5px 10px; border-radius: 4px; border: 1px solid var(--accent); cursor: pointer; background: transparent; color: var(--accent); }
  .action-btn:hover{ background: var(--accent-soft); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card card">
    <div class="op-logo">Cirro<em>Sys Ops</em></div>
    <div class="op-sub">Staff Access Only</div>
    <div class="lfield">
      <label>Access Key</label>
      <input type="password" id="pw" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary btn-login" id="btn-login" onclick="doLogin()">Enter</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<div id="dashboard">
  <div class="topbar op-topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      Cirro<em>Sys Ops</em>
    </div>
    <div class="tb-right">
      <span class="tb-badge">STAFF</span>
      <button class="btn-sm" onclick="loadData()">↻ Refresh</button>
      <button class="btn-sm" onclick="adminLogout()">Sign Out</button>
    </div>
  </div>

  <div class="page">
    <div class="stats" id="stats"></div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-orders-btn" onclick="showTab('orders')">Orders</button>
      <button class="tab-btn" id="tab-orgs-btn" onclick="showTab('orgs')">Organizations</button>
    </div>

    <div class="tab-panel active" id="tab-orders">
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">All Orders</span>
          <input class="search-box" id="order-search" placeholder="Search organization, city, country…" oninput="filterOrders()">
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Order</th><th>Organization</th><th>Destination</th><th>Provider / DC</th><th>Status</th><th>Update</th><th>Price</th></tr></thead>
            <tbody id="orders-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="tab-orgs">
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">All Organizations</span>
          <input class="search-box" id="org-search" placeholder="Search organization or member…" oninput="filterOrgs()">
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Organization</th><th>Members</th><th>Orders</th><th>Total Billed</th><th>Created</th></tr></thead>
            <tbody id="orgs-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let allOrders = [];
let allOrgs = [];
const STATUSES = ['received','transmitted','processing','shipped','delivered','exception'];

function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function money(n){ return '$' + Number(n||0).toFixed(2); }
function fmtDate(iso){ return iso ? new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—'; }

async function doLogin(){
  const pw=document.getElementById('pw').value;
  const btn=document.getElementById('btn-login');
  const err=document.getElementById('lerr');
  btn.disabled=true; btn.textContent='Checking…'; err.style.display='none';
  try{
    const res=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    const data=await res.json();
    if(!data.ok){ err.textContent='Wrong access key.'; err.style.display='block'; btn.disabled=false; btn.textContent='Enter'; return; }
    document.getElementById('login-screen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadData();
  }catch{
    err.textContent='Network error.'; err.style.display='block'; btn.disabled=false; btn.textContent='Enter';
  }
}

async function adminLogout(){
  await fetch('/api/admin/logout',{method:'POST'});
  location.reload();
}

function showTab(name){
  document.getElementById('tab-orders').classList.toggle('active', name==='orders');
  document.getElementById('tab-orgs').classList.toggle('active', name==='orgs');
  document.getElementById('tab-orders-btn').classList.toggle('active', name==='orders');
  document.getElementById('tab-orgs-btn').classList.toggle('active', name==='orgs');
}

async function loadData(){
  try{
    const [ordersRes, orgsRes] = await Promise.all([
      fetch('/api/admin/orders'), fetch('/api/admin/organizations')
    ]);
    if(ordersRes.status===401 || orgsRes.status===401){ location.reload(); return; }
    const ordersData = await ordersRes.json();
    const orgsData = await orgsRes.json();
    if(!ordersData.ok || !orgsData.ok) return;
    allOrders = ordersData.orders;
    allOrgs = orgsData.organizations;
    renderStats();
    renderOrders(allOrders);
    renderOrgs(allOrgs);
  }catch(e){ console.error(e); }
}

function renderStats(){
  const inTransit = allOrders.filter(o=>['transmitted','processing','shipped'].includes(o.status)).length;
  const delivered = allOrders.filter(o=>o.status==='delivered').length;
  const revenue = allOrders.reduce((s,o)=>s+o.priceTotal,0);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Organizations</div><div class="stat-val">${allOrgs.length}</div></div>
    <div class="stat"><div class="stat-label">Total Orders</div><div class="stat-val">${allOrders.length}</div></div>
    <div class="stat"><div class="stat-label">In Transit</div><div class="stat-val">${inTransit}</div></div>
    <div class="stat"><div class="stat-label">Delivered</div><div class="stat-val">${delivered}</div></div>
    <div class="stat"><div class="stat-label">Total Billed</div><div class="stat-val">${money(revenue)}</div></div>
  `;
}

function renderOrders(list){
  const tbody = document.getElementById('orders-tbody');
  if(!list.length){ tbody.innerHTML = '<tr><td colspan="7" class="empty">No orders yet.</td></tr>'; return; }
  tbody.innerHTML = list.map(o => `
    <tr>
      <td class="mono">${esc(o.id.slice(0,8))}</td>
      <td>${esc(o.organizationName)}</td>
      <td>${esc(o.city)}, ${esc(o.country)}</td>
      <td>${esc(o.providerName||'—')}<br><span style="color:var(--text-3);font-size:.72rem">${esc(o.dcLocation||'')}</span></td>
      <td><span class="badge ${o.status}">${esc(o.status)}</span></td>
      <td>
        <div class="qty-row">
          <select id="status-${o.id}">
            ${STATUSES.map(s=>`<option value="${s}" ${s===o.status?'selected':''}>${s}</option>`).join('')}
          </select>
          <input id="tracking-${o.id}" placeholder="Tracking #" value="${esc(o.trackingNumber||'')}">
          <input id="carrier-${o.id}" placeholder="Carrier" value="${esc(o.carrier||'')}">
          <button class="action-btn" onclick="updateOrder('${o.id}')">Save</button>
        </div>
      </td>
      <td class="mono">${money(o.priceTotal)}</td>
    </tr>
  `).join('');
}

function renderOrgs(list){
  const tbody = document.getElementById('orgs-tbody');
  if(!list.length){ tbody.innerHTML = '<tr><td colspan="5" class="empty">No organizations yet.</td></tr>'; return; }
  tbody.innerHTML = list.map(o => `
    <tr>
      <td>${esc(o.name)}</td>
      <td>${o.members.map(m=>esc(m.name)+(m.role==='owner'?' (owner)':'')).join(', ')}</td>
      <td class="mono">${o.totalOrders}</td>
      <td class="mono">${money(o.totalSpend)}</td>
      <td class="mono" style="color:var(--text-3)">${fmtDate(o.createdAt)}</td>
    </tr>
  `).join('');
}

function filterOrders(){
  const q = document.getElementById('order-search').value.toLowerCase();
  renderOrders(allOrders.filter(o =>
    o.organizationName.toLowerCase().includes(q) || o.city.toLowerCase().includes(q) || o.country.toLowerCase().includes(q)
  ));
}

function filterOrgs(){
  const q = document.getElementById('org-search').value.toLowerCase();
  renderOrgs(allOrgs.filter(o =>
    o.name.toLowerCase().includes(q) || o.members.some(m=>m.name.toLowerCase().includes(q) || m.email.toLowerCase().includes(q))
  ));
}

async function updateOrder(id){
  const status = document.getElementById(`status-${id}`).value;
  const trackingNumber = document.getElementById(`tracking-${id}`).value;
  const carrier = document.getElementById(`carrier-${id}`).value;
  const res = await fetch(`/api/admin/orders/${id}/status`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ status, trackingNumber, carrier })
  });
  const data = await res.json();
  if(data.ok) loadData(); else alert(data.error||'Error');
}

fetch('/api/admin/orders').then(r=>{
  if(r.status===200){ document.getElementById('login-screen').style.display='none'; document.getElementById('dashboard').style.display='block'; loadData(); }
});
</script>
</body>
</html>
