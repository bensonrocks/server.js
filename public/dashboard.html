<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard — CirroSys</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/theme.css">
<style>
  .grid-2{ display: grid; grid-template-columns: 2.1fr 1fr; gap: 20px; align-items: start; }
  @media(max-width:900px){ .grid-2{ grid-template-columns: 1fr; } }
  tr.order-row{ cursor: pointer; }
  tr.order-row:hover td{ background: var(--bg-2); }

  .dc-list{ display: flex; flex-direction: column; gap: 1px; background: var(--border); }
  .dc-item{ background: var(--surface); padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .dc-region{ font-family: var(--mono); font-size: .58rem; letter-spacing: .1em; text-transform: uppercase; color: var(--text-3); }
  .dc-name{ font-weight: 600; font-size: .85rem; margin-top: 2px; }
  .dc-loc{ font-size: .76rem; color: var(--text-2); margin-top: 1px; }
  .dc-code{ font-family: var(--mono); font-size: .68rem; color: var(--accent); flex-shrink: 0; }

  .item-row{ display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 8px; margin-bottom: 8px; align-items: center; }
  .item-remove{ background: transparent; border: 1px solid var(--border-2); color: var(--text-3); border-radius: 6px; width: 34px; height: 34px; cursor: pointer; }
  .item-remove:hover{ color: var(--danger); border-color: var(--danger); }

  .detail-grid{ display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; font-size: .82rem; }
  .detail-item .dl{ color: var(--text-3); font-family: var(--mono); font-size: .6rem; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 3px; }
  .detail-item .dv{ color: var(--text); }
  .timeline{ display: flex; flex-direction: column; margin-top: 6px; }
  .tl-item{ display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .tl-item:last-child{ border-bottom: none; }
  .tl-dot{ width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex-shrink: 0; }
  .tl-status{ font-weight: 600; font-size: .82rem; text-transform: capitalize; }
  .tl-time{ font-family: var(--mono); font-size: .68rem; color: var(--text-3); }
  .tl-note{ font-size: .78rem; color: var(--text-2); margin-top: 2px; }
  .price-table{ width: 100%; font-size: .82rem; margin-top: 6px; }
  .price-table td{ padding: 6px 0; border: none; }
  .price-table tr:last-child td{ border-top: 1px solid var(--border); font-weight: 600; color: var(--accent); }
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="/dashboard">
    <span class="brand-mark"></span>
    Cirro<em>Sys</em>
  </a>
  <div class="nav">
    <a class="active" href="/dashboard">Dashboard</a>
    <a href="/billing">Billing</a>
    <a href="/settings">Settings</a>
  </div>
  <div class="tb-right">
    <span class="tb-user" id="tb-user"></span>
    <button class="btn-sm" onclick="logout()">Sign Out</button>
  </div>
</div>

<div class="page">
  <div class="page-head">
    <div>
      <div class="page-title">Orders</div>
      <div class="page-sub" id="page-sub">Drop, route and track your organization's shipments</div>
    </div>
    <button class="btn-primary" onclick="openNewOrder()">+ Drop New Order</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="grid-2">
    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">Recent Orders</span>
        <button class="btn-sm" onclick="loadOrders()">↻ Refresh</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Order</th><th>Destination</th><th>Provider / DC</th><th>Status</th><th>Price</th></tr></thead>
          <tbody id="orders-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><span class="panel-title">Fulfillment Network</span></div>
      <div class="dc-list" id="network-list"></div>
    </div>
  </div>
</div>

<!-- New Order Modal -->
<div class="modal-overlay" id="new-order-overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Drop New Order</div>
      <button class="modal-close" onclick="closeNewOrder()">&times;</button>
    </div>
    <div class="error" id="order-err"></div>
    <form id="order-form">
      <div class="section-label">Recipient</div>
      <div class="field"><label>Recipient Name</label><input id="f-name" required></div>
      <div class="field"><label>Address</label><input id="f-address" required></div>
      <div class="field-row">
        <div class="field"><label>City</label><input id="f-city" required></div>
        <div class="field"><label>Region / State</label><input id="f-region"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Postal Code</label><input id="f-postal"></div>
        <div class="field">
          <label>Country (ISO code)</label>
          <input id="f-country" placeholder="e.g. MX, US, GB" maxlength="2" required style="text-transform:uppercase">
        </div>
      </div>

      <div class="section-label">Items</div>
      <div id="items-wrap"></div>
      <button type="button" class="btn-link" onclick="addItemRow()">+ Add item</button>

      <div class="section-label">Service Level</div>
      <div class="field">
        <select id="f-service">
          <option value="standard">Standard</option>
          <option value="express">Express (+60%)</option>
        </select>
      </div>

      <div class="field"><label>Notes (optional)</label><textarea id="f-notes" rows="2"></textarea></div>

      <button class="btn-primary" type="submit" id="order-submit-btn" style="width:100%">Drop Order</button>
    </form>
  </div>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="detail-overlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Order Detail</div>
      <button class="modal-close" onclick="closeDetail()">&times;</button>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<script>
let itemRowCount = 0;

function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function money(n){ return '$' + Number(n||0).toFixed(2); }
function fmtDate(iso){ return new Date(iso).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

fetch('/api/auth/me').then(r=>r.json()).then(d=>{
  if(!d.user){ location.href='/login'; return; }
  document.getElementById('tb-user').textContent = d.organization ? `${d.user.name} · ${d.organization.name}` : d.user.name;
  document.getElementById('page-sub').textContent = d.organization ? `Welcome back, ${d.user.name.split(' ')[0]} — here's what's moving for ${d.organization.name}.` : `Welcome back, ${d.user.name.split(' ')[0]}.`;
});

async function logout(){
  await fetch('/api/auth/logout',{method:'POST'});
  location.href='/login';
}

// ── Network panel ──────────────────────────────────────────────────────
async function loadNetwork(){
  const res = await fetch('/api/providers');
  const data = await res.json();
  if(!data.ok) return;
  document.getElementById('network-list').innerHTML = data.providers.map(p => `
    <div class="dc-item">
      <div>
        <div class="dc-region">${esc(p.region)}</div>
        <div class="dc-name">${esc(p.name)}</div>
        <div class="dc-loc">${esc(p.dc)}, ${esc(p.countryName)}</div>
      </div>
      <div class="dc-code">${esc(p.code)}</div>
    </div>
  `).join('');
}

// ── Orders ─────────────────────────────────────────────────────────────
let allOrders = [];

async function loadOrders(){
  const res = await fetch('/api/orders');
  const data = await res.json();
  if(!data.ok) return;
  allOrders = data.orders;
  renderStats(allOrders);
  renderTable(allOrders);
}

function renderStats(list){
  const inTransit = list.filter(o=>['transmitted','processing','shipped'].includes(o.status)).length;
  const delivered = list.filter(o=>o.status==='delivered').length;
  const now = new Date();
  const monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthSpend = list.filter(o=>{
    const d = new Date(o.createdAt);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` === monthKey;
  }).reduce((s,o)=>s+o.priceTotal,0);
  const lifetime = list.reduce((s,o)=>s+o.priceTotal,0);

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">In Transit</div><div class="stat-val">${inTransit}</div></div>
    <div class="stat"><div class="stat-label">Delivered</div><div class="stat-val">${delivered}</div></div>
    <div class="stat"><div class="stat-label">This Month</div><div class="stat-val">${money(monthSpend)}</div></div>
    <div class="stat"><div class="stat-label">Lifetime Spend</div><div class="stat-val">${money(lifetime)}</div><div class="stat-note">${list.length} orders total</div></div>
  `;
}

function renderTable(list){
  const tbody = document.getElementById('orders-tbody');
  if(!list.length){ tbody.innerHTML = '<tr><td colspan="5" class="empty">No orders yet — drop your first order to get started.</td></tr>'; return; }
  tbody.innerHTML = list.map(o => `
    <tr class="order-row" onclick="openDetail('${o.id}')">
      <td class="mono">${esc(o.id.slice(0,8))}</td>
      <td>${esc(o.city)}, ${esc(o.country)}</td>
      <td>${esc(o.providerName||'—')}<br><span style="color:var(--text-3);font-size:.74rem">${esc(o.dcLocation||'')}</span></td>
      <td><span class="badge ${o.status}">${esc(o.status)}</span></td>
      <td class="mono">${money(o.priceTotal)}</td>
    </tr>
  `).join('');
}

// ── New order modal ────────────────────────────────────────────────────
function openNewOrder(){
  document.getElementById('order-form').reset();
  document.getElementById('items-wrap').innerHTML = '';
  itemRowCount = 0;
  addItemRow();
  document.getElementById('order-err').style.display='none';
  document.getElementById('new-order-overlay').classList.add('open');
}
function closeNewOrder(){ document.getElementById('new-order-overlay').classList.remove('open'); }

function addItemRow(){
  itemRowCount++;
  const id = itemRowCount;
  const div = document.createElement('div');
  div.className = 'item-row';
  div.id = `item-row-${id}`;
  div.innerHTML = `
    <input placeholder="Description" data-role="desc">
    <input type="number" min="1" value="1" placeholder="Qty" data-role="qty">
    <input type="number" min="0.01" step="0.01" placeholder="Weight (kg)" data-role="weight">
    <button type="button" class="item-remove" onclick="document.getElementById('item-row-${id}').remove()">&times;</button>
  `;
  document.getElementById('items-wrap').appendChild(div);
}

document.getElementById('order-form').addEventListener('submit', async e => {
  e.preventDefault();
  const err = document.getElementById('order-err');
  const btn = document.getElementById('order-submit-btn');
  err.style.display='none';

  const items = Array.from(document.querySelectorAll('#items-wrap .item-row')).map(row => ({
    description: row.querySelector('[data-role="desc"]').value,
    qty: Number(row.querySelector('[data-role="qty"]').value) || 1,
    weightKg: Number(row.querySelector('[data-role="weight"]').value) || 0,
  }));

  const payload = {
    recipientName: document.getElementById('f-name').value,
    addressLine1: document.getElementById('f-address').value,
    city: document.getElementById('f-city').value,
    region: document.getElementById('f-region').value,
    postalCode: document.getElementById('f-postal').value,
    country: document.getElementById('f-country').value.toUpperCase(),
    items,
    serviceLevel: document.getElementById('f-service').value,
    notes: document.getElementById('f-notes').value,
  };

  btn.disabled = true; btn.textContent = 'Dropping order…';
  try {
    const res = await fetch('/api/orders', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await res.json();
    if(!data.ok){ err.textContent = data.error; err.style.display='block'; btn.disabled=false; btn.textContent='Drop Order'; return; }
    closeNewOrder();
    loadOrders();
  } catch {
    err.textContent = 'Network error — please try again.'; err.style.display='block';
  } finally {
    btn.disabled=false; btn.textContent='Drop Order';
  }
});

// ── Order detail modal ─────────────────────────────────────────────────
function openDetail(id){
  const o = allOrders.find(x=>x.id===id);
  if(!o) return;
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-grid">
      <div class="detail-item"><div class="dl">Order ID</div><div class="dv mono">${esc(o.id)}</div></div>
      <div class="detail-item"><div class="dl">Status</div><div class="dv"><span class="badge ${o.status}">${esc(o.status)}</span></div></div>
      <div class="detail-item"><div class="dl">Recipient</div><div class="dv">${esc(o.recipientName)}</div></div>
      <div class="detail-item"><div class="dl">Destination</div><div class="dv">${esc(o.addressLine1)}, ${esc(o.city)}, ${esc(o.country)}</div></div>
      <div class="detail-item"><div class="dl">Provider</div><div class="dv">${esc(o.providerName||'—')}</div></div>
      <div class="detail-item"><div class="dl">Distribution Center</div><div class="dv">${esc(o.dcLocation||'—')}</div></div>
      <div class="detail-item"><div class="dl">Service Level</div><div class="dv" style="text-transform:capitalize">${esc(o.serviceLevel)}</div></div>
      <div class="detail-item"><div class="dl">Reference</div><div class="dv mono">${esc(o.externalRef||'—')}</div></div>
      ${o.trackingNumber ? `<div class="detail-item"><div class="dl">Tracking</div><div class="dv mono">${esc(o.carrier||'')} ${esc(o.trackingNumber)}</div></div>` : ''}
    </div>

    <div class="section-label">Pricing</div>
    <table class="price-table">
      ${o.priceBreakdown.map(b=>`<tr><td>${esc(b.label)}</td><td style="text-align:right">${money(b.amount)}</td></tr>`).join('')}
      <tr><td>Total</td><td style="text-align:right">${money(o.priceTotal)}</td></tr>
    </table>

    <div class="section-label">Status Timeline</div>
    <div class="timeline">
      ${o.statusHistory.map(h=>`
        <div class="tl-item">
          <div class="tl-dot"></div>
          <div>
            <div class="tl-status">${esc(h.status)}</div>
            <div class="tl-time">${fmtDate(h.at)}</div>
            ${h.note?`<div class="tl-note">${esc(h.note)}</div>`:''}
          </div>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetail(){ document.getElementById('detail-overlay').classList.remove('open'); }

loadNetwork();
loadOrders();
</script>
</body>
</html>
