<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Singapore Customs Lot Tracking</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#0f172a;font-size:14px}
    .header{background:#0f172a;color:#fff;padding:16px 20px;border-bottom:2px solid #fb923c;display:flex;align-items:center;justify-content:space-between}
    .header h1{font-size:18px;font-weight:900}
    .nav{display:flex;gap:12px}
    .nav a{color:#94a3b8;text-decoration:none;padding:6px 12px;border-radius:6px;font-size:13px;transition:all .15s}
    .nav a:hover{background:#1e293b;color:#fff}
    .nav a.active{background:#1e293b;color:#fff}
    .container{max-width:1400px;margin:0 auto;padding:20px}
    .card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;border:1px solid #e2e8f0}
    .card-header{background:#f8fafc;padding:16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .card-header h2{font-size:15px;font-weight:700}
    .card-body{padding:16px}
    .grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:20px}
    .stat-card{background:linear-gradient(135deg,#f8fafc 0%,#f1f5f9 100%);padding:16px;border-radius:8px;border:1px solid #e2e8f0}
    .stat-card-label{font-size:12px;color:#64748b;margin-bottom:6px}
    .stat-card-value{font-size:24px;font-weight:700;color:#0f172a}
    .stat-card-sub{font-size:11px;color:#94a3b8;margin-top:4px}
    .btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
    .btn-primary{background:#f59e0b;color:#fff}
    .btn-primary:hover{background:#d97706}
    .btn-secondary{background:#e2e8f0;color:#0f172a}
    .btn-secondary:hover{background:#cbd5e1}
    .btn-danger{background:#fee2e2;color:#991b1b}
    .btn-danger:hover{background:#fecaca}
    .table{width:100%;border-collapse:collapse;font-size:13px}
    .table th{background:#f8fafc;padding:10px;text-align:left;font-weight:700;border-bottom:1.5px solid #e2e8f0;font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.3px}
    .table td{padding:10px;border-bottom:1px solid #f1f5f9}
    .table tr:hover{background:#f8fafc}
    .badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}
    .badge-pending{background:#fef08a;color:#854d0e}
    .badge-locked{background:#dbeafe;color:#1e40af}
    .badge-exported{background:#dcfce7;color:#166534}
    .badge-immutable{background:#f3e8ff;color:#6b21a8}
    .tabs{display:flex;gap:8px;border-bottom:1px solid #e2e8f0;margin-bottom:16px}
    .tab{padding:10px 16px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
    .tab.active{color:#0f172a;border-bottom-color:#f59e0b}
    .tab:hover{color:#0f172a}
    .search-box{display:flex;gap:8px;flex:1;min-width:250px}
    .search-box input{padding:8px 12px;border:1px solid #e2e8f0;border-radius:6px;flex:1;font-size:13px}
    .loading{text-align:center;padding:20px;color:#94a3b8}
    .error{background:#fee2e2;color:#991b1b;padding:12px;border-radius:6px;margin-bottom:16px}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
    .modal.show{display:flex}
    .modal-content{background:#fff;border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:90vh;overflow-y:auto}
    .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:24px;cursor:pointer;color:#64748b}
    .customs-lot-item{background:#f8fafc;padding:12px;border-radius:6px;margin-bottom:10px;border-left:4px solid #f59e0b}
    .lot-number{font-size:14px;font-weight:700;color:#0f172a;font-family:monospace}
    .lot-status{margin-top:6px;display:flex;gap:8px;align-items:center}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px}
    .form-group input,.form-group select{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;font-family:inherit}
    .form-group input:focus,.form-group select:focus{outline:none;border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.1)}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .audit-timeline{margin:16px 0;padding:12px;background:#f8fafc;border-radius:6px;border-left:4px solid #f59e0b}
    .audit-entry{padding:8px 0;border-bottom:1px solid #e2e8f0;font-size:12px}
    .audit-entry:last-child{border-bottom:none}
    .audit-time{color:#64748b}
  </style>
</head>
<body>
  <div class="header">
    <h1>Singapore Customs Lot Tracking</h1>
    <div class="nav">
      <a href="portal.html">Orders</a>
      <a href="warehouse-dashboard.html">Inventory</a>
      <a href="batch-tracking.html">Batches</a>
      <a href="customs-tracking.html" class="active">Customs</a>
    </div>
  </div>

  <div class="container">
    <div id="error" class="error" style="display:none;"></div>

    <div class="grid-2">
      <div class="stat-card">
        <div class="stat-card-label">Sequence Status</div>
        <div id="seqStatus" class="stat-card-value">—</div>
        <div id="seqSub" class="stat-card-sub"></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Next Lot Number</div>
        <div id="nextLot" class="stat-card-value" style="font-size:16px;font-family:monospace">—</div>
        <div class="stat-card-sub">Ready to assign</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Pending Lots (Not Exported)</div>
        <div id="pendingCount" class="stat-card-value">—</div>
        <div class="stat-card-sub">Locked, awaiting export</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Exported Lots</div>
        <div id="exportedCount" class="stat-card-value">—</div>
        <div class="stat-card-sub">Shipped</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <h2>Customs Lot Management</h2>
        <button class="btn btn-primary" onclick="showConfigureSequence()">Configure Sequence</button>
      </div>
      <div class="card-body">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('pending')">Pending Export</button>
          <button class="tab" onclick="switchTab('exported')">Exported</button>
        </div>
        <div id="tabContent">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Export Manifest Generator</h2>
      </div>
      <div class="card-body">
        <div style="margin-bottom:16px">
          <button class="btn btn-primary" onclick="generateExportManifest()">Generate Manifest</button>
          <button class="btn btn-secondary" onclick="downloadManifestCSV()">Download CSV</button>
        </div>
        <div id="manifestContent" style="display:none;max-height:400px;overflow-y:auto"></div>
      </div>
    </div>
  </div>

  <div id="configModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('configModal')">×</button>
      <h2 style="margin-bottom:16px">Configure Customs Lot Sequence</h2>
      <div class="form-group">
        <label>Prefix</label>
        <input type="text" id="seqPrefix" value="SG-CUST" placeholder="e.g., SG-CUST">
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Year</label>
          <input type="number" id="seqYear" value="2026" placeholder="e.g., 2026">
        </div>
        <div class="form-group">
          <label>Starting Number</label>
          <input type="number" id="seqStarting" value="1" placeholder="e.g., 1">
        </div>
      </div>
      <div style="margin-top:20px;display:flex;gap:8px">
        <button class="btn btn-primary" onclick="initializeSequence()">Initialize</button>
        <button class="btn btn-secondary" onclick="closeModal('configModal')">Cancel</button>
      </div>
    </div>
  </div>

  <div id="detailModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('detailModal')">×</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    let currentTab = 'pending';
    let allLots = [];

    function showError(msg) {
      document.getElementById('error').textContent = msg;
      document.getElementById('error').style.display = 'block';
    }

    function clearError() {
      document.getElementById('error').style.display = 'none';
    }

    async function loadSequenceInfo() {
      try {
        const res = await fetch('/api/customs/sequence-info', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to load sequence');
        const data = await res.json();

        if (data.initialized) {
          document.getElementById('seqStatus').textContent = 'Active';
          document.getElementById('seqSub').textContent = `${data.prefix}-${data.year}`;

          const res2 = await fetch('/api/customs/next-lot-number', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (res2.ok) {
            const nextData = await res2.json();
            document.getElementById('nextLot').textContent = nextData.customsLotNumber;
          }
        } else {
          document.getElementById('seqStatus').textContent = 'Not Set';
          document.getElementById('seqSub').textContent = 'Configure to enable customs tracking';
        }
      } catch (e) {
        showError('Failed to load sequence info: ' + e.message);
      }
    }

    async function loadPendingLots() {
      try {
        const res = await fetch('/api/customs/pending-lots', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to load pending lots');
        const data = await res.json();
        allLots = data.lots || [];
        renderLots();
      } catch (e) {
        showError('Failed to load lots: ' + e.message);
      }
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/customs/pending-lots', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to load stats');
        const data = await res.json();
        const pending = (data.lots || []).filter(l => !l.exported).length;
        const exported = (data.lots || []).filter(l => l.exported).length;

        document.getElementById('pendingCount').textContent = pending;
        document.getElementById('exportedCount').textContent = exported;
      } catch (e) {
        // Silent fail for stats
      }
    }

    function renderLots() {
      const filtered = currentTab === 'pending'
        ? allLots.filter(l => !l.exported)
        : allLots.filter(l => l.exported);

      if (filtered.length === 0) {
        document.getElementById('tabContent').innerHTML = `<p style="color:#94a3b8">No ${currentTab} lots</p>`;
        return;
      }

      const html = filtered.map(lot => `
        <div class="customs-lot-item">
          <div class="lot-number">${lot.customsLotNumber}</div>
          <div style="font-size:12px;color:#64748b;margin-top:6px">
            Carton: ${lot.cartonId}<br>
            ${lot.orderId ? 'Order: ' + lot.orderId + '<br>' : ''}
            ${lot.hsCode ? 'HS Code: ' + lot.hsCode + '<br>' : ''}
          </div>
          <div class="lot-status">
            <span class="badge ${lot.exported ? 'badge-exported' : lot.locked ? 'badge-locked' : 'badge-pending'}">
              ${lot.exported ? 'Exported' : lot.locked ? 'Locked (Immutable)' : 'Pending'}
            </span>
            <button class="btn btn-secondary" onclick="viewLotDetail('${lot.id}')">Details</button>
            ${!lot.exported ? `
              <button class="btn btn-primary" onclick="markAsExported('${lot.id}')">Mark Exported</button>
            ` : ''}
          </div>
        </div>
      `).join('');

      document.getElementById('tabContent').innerHTML = html;
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      renderLots();
    }

    async function viewLotDetail(lotId) {
      const lot = allLots.find(l => l.id === lotId);
      if (!lot) return;

      try {
        const res = await fetch(`/api/customs/${lotId}/audit`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to load audit');
        const data = await res.json();

        const html = `
          <h2 style="margin-bottom:16px">${data.customsLot.customsLotNumber}</h2>
          <div style="font-size:13px">
            <div style="background:#f8fafc;padding:12px;border-radius:6px;margin-bottom:16px">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div>
                  <div style="color:#64748b;font-size:11px">Carton ID</div>
                  <div style="font-weight:700">${data.customsLot.cartonId}</div>
                </div>
                <div>
                  <div style="color:#64748b;font-size:11px">HS Code</div>
                  <div style="font-weight:700">${data.customsLot.hsCode || 'N/A'}</div>
                </div>
                <div>
                  <div style="color:#64748b;font-size:11px">Description</div>
                  <div style="font-weight:700">${data.customsLot.description || 'N/A'}</div>
                </div>
                <div>
                  <div style="color:#64748b;font-size:11px">Total Pieces</div>
                  <div style="font-weight:700">${data.customsLot.totalPieces || 'N/A'}</div>
                </div>
              </div>
            </div>

            <div style="margin-bottom:16px">
              <div style="font-weight:700;margin-bottom:8px">Timeline</div>
              <div class="audit-timeline">
                <div class="audit-entry">
                  <strong>Assigned</strong><br>
                  <span class="audit-time">${data.timeline.assignedAt || 'N/A'}</span>
                </div>
                <div class="audit-entry">
                  <strong>Status: ${data.timeline.status}</strong><br>
                  <span class="audit-time">Locked at ${data.timeline.lockedAt || 'Immediately'}</span><br>
                  <span style="color:#dc2626;font-size:11px">⚠️ This lot number CANNOT be reused or reassigned</span>
                </div>
                ${data.timeline.exportedAt ? `
                  <div class="audit-entry">
                    <strong>Exported</strong><br>
                    <span class="audit-time">${data.timeline.exportedAt}</span>
                  </div>
                ` : ''}
              </div>
            </div>
          </div>
        `;

        document.getElementById('detailContent').innerHTML = html;
        document.getElementById('detailModal').classList.add('show');
      } catch (e) {
        showError('Failed to load lot details: ' + e.message);
      }
    }

    async function markAsExported(lotId) {
      if (!confirm('Mark this lot as exported? This action is final.')) return;

      try {
        const res = await fetch(`/api/customs/${lotId}/mark-exported`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            shippingRefNo: prompt('Enter shipping reference (optional):')
          })
        });
        if (!res.ok) throw new Error('Failed to mark exported');

        clearError();
        closeModal('detailModal');
        await loadPendingLots();
        await loadStats();
      } catch (e) {
        showError('Failed to mark exported: ' + e.message);
      }
    }

    function showConfigureSequence() {
      document.getElementById('configModal').classList.add('show');
    }

    async function initializeSequence() {
      try {
        const res = await fetch('/api/customs/configure-sequence', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            prefix: document.getElementById('seqPrefix').value,
            year: parseInt(document.getElementById('seqYear').value),
            startingNumber: parseInt(document.getElementById('seqStarting').value)
          })
        });
        if (!res.ok) throw new Error('Failed to initialize');

        clearError();
        closeModal('configModal');
        await loadSequenceInfo();
      } catch (e) {
        showError('Failed to initialize sequence: ' + e.message);
      }
    }

    async function generateExportManifest() {
      try {
        const res = await fetch('/api/customs/pending-lots', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to generate manifest');
        const data = await res.json();
        const pending = (data.lots || []).filter(l => !l.exported);

        if (pending.length === 0) {
          document.getElementById('manifestContent').innerHTML = '<p style="color:#94a3b8">No pending lots to export</p>';
          document.getElementById('manifestContent').style.display = 'block';
          return;
        }

        const html = `
          <table class="table" style="font-size:12px">
            <tr>
              <th>Lot Number</th>
              <th>Carton ID</th>
              <th>HS Code</th>
              <th>Pieces</th>
              <th>Weight</th>
              <th>Status</th>
            </tr>
            ${pending.map(lot => `
              <tr>
                <td><strong>${lot.customsLotNumber}</strong></td>
                <td>${lot.cartonId}</td>
                <td>${lot.hsCode || 'N/A'}</td>
                <td>${lot.totalPieces || 'N/A'}</td>
                <td>${lot.grossWeightKg || 'N/A'}kg</td>
                <td><span class="badge badge-locked">Locked</span></td>
              </tr>
            `).join('')}
          </table>
        `;
        document.getElementById('manifestContent').innerHTML = html;
        document.getElementById('manifestContent').style.display = 'block';
      } catch (e) {
        showError('Failed to generate manifest: ' + e.message);
      }
    }

    function downloadManifestCSV() {
      try {
        const pending = allLots.filter(l => !l.exported);
        const csv = 'Lot Number,Carton ID,HS Code,Pieces,Weight (kg),Status\n' +
          pending.map(lot =>
            `${lot.customsLotNumber},${lot.cartonId},${lot.hsCode || 'N/A'},${lot.totalPieces || 'N/A'},${lot.grossWeightKg || 'N/A'},Locked`
          ).join('\n');

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'export-manifest-' + new Date().toISOString().split('T')[0] + '.csv';
        a.click();
      } catch (e) {
        showError('Failed to download: ' + e.message);
      }
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('show');
    }

    window.addEventListener('load', () => {
      if (!token) {
        window.location.href = 'portal.html';
        return;
      }
      loadSequenceInfo();
      loadPendingLots();
      loadStats();
      setInterval(() => loadStats(), 30000); // Refresh every 30s
    });
  </script>
</body>
</html>
