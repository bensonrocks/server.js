<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"/>
<title>MarketPulse — Day Trade Brief</title>
<style>
:root {
  --bg:#07070f;--surface:#0c0c1a;--card:#10101e;--card2:#14142a;--border:#1c1c32;
  --cyan:#00d4ff;--gold:#ffd700;--orange:#ff9500;--green:#00e676;--red:#ff4c4c;--purple:#aa88ff;
  --muted:#44445a;--text:#d0d0ee;--dim:#7777aa;--brad:10px;
}
[data-theme="light"] {
  --bg:#f4f4f8;--surface:#ffffff;--card:#ffffff;--card2:#eeeef5;--border:#d8d8e8;
  --cyan:#0077aa;--gold:#b38600;--orange:#c85a00;--green:#008844;--red:#cc2222;--purple:#6644bb;
  --muted:#b0b0c8;--text:#111128;--dim:#55557a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;font-size:14px}
a{color:inherit;text-decoration:none}
button,a{touch-action:manipulation}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:0 14px;height:48px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:800;letter-spacing:1.5px;white-space:nowrap}
.logo-pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.clocks{display:flex;gap:6px;overflow-x:auto;flex:1;align-items:center;scrollbar-width:none}
.clocks::-webkit-scrollbar{display:none}
.clock-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;border:1px solid var(--border);white-space:nowrap;font-size:10px;font-weight:600;flex-shrink:0;transition:.25s}
.clock-chip.open{border-color:var(--green);background:#00e67611;color:var(--green)}
.clock-chip.pre{border-color:var(--gold);background:#ffd70011;color:var(--gold)}
.clock-chip.closed{color:var(--muted)}
.clock-chip .t{font-weight:400;opacity:.65}
.ws-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:.3s}
.ws-dot.live{background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite}
.unread{display:none;align-items:center;justify-content:center;min-width:17px;height:17px;border-radius:9px;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:0 3px;flex-shrink:0}
.unread.show{display:flex}
.notif-btn{display:flex;align-items:center;gap:5px;padding:5px 9px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);cursor:pointer;font-size:11px;transition:.15s;flex-shrink:0}
.notif-btn:hover,.notif-btn.on{border-color:var(--cyan);color:var(--cyan);background:#00d4ff0a}

/* ── TABS ── */
.tabbar{display:flex;align-items:center;gap:2px;padding:0 14px;height:38px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{padding:4px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--dim);transition:.15s;border:1px solid transparent}
.tab:hover{color:var(--text)}
.tab.active{color:#fff;background:var(--card);border-color:var(--border)}
.tab-n{display:inline-flex;align-items:center;justify-content:center;min-width:15px;height:15px;border-radius:8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:0 3px;margin-left:4px;vertical-align:middle}
.tab-n:empty{display:none}

/* ── BODY ── */
.body{flex:1;display:flex;overflow:hidden}
.page{display:none;flex:1;overflow-y:auto;padding:14px}
.page.active{display:block}

/* ── BRIEF PAGE ── */
.session-banner{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--brad);margin-bottom:10px}
.s-emoji{font-size:22px}
.s-name{font-size:15px;font-weight:700;color:#fff}
.s-desc{font-size:11px;color:var(--dim);margin-top:2px}
.s-time{margin-left:auto;text-align:right}
.s-clock{font-size:20px;font-weight:800;color:var(--cyan);font-family:'SF Mono',monospace;letter-spacing:1px}
.s-date{font-size:10px;color:var(--dim);margin-top:1px}
.s-mkt{font-size:9px;margin-top:3px;padding:2px 7px;border-radius:10px;display:inline-block;font-weight:700;letter-spacing:.5px}
.s-mkt.au{background:#00e67614;color:var(--green);border:1px solid #00e67630}
.s-mkt.hk_sg{background:#ffd70014;color:var(--gold);border:1px solid #ffd70030}
.s-mkt.us{background:#00d4ff14;color:var(--cyan);border:1px solid #00d4ff30}

/* Brief filter bar */
.brief-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.bfil{padding:4px 11px;border-radius:16px;border:1px solid var(--border);background:none;color:var(--dim);cursor:pointer;font-size:11px;font-weight:600;transition:.15s}
.bfil:hover{border-color:var(--text);color:var(--text)}
.bfil.active{background:var(--card2);border-color:var(--cyan);color:var(--cyan)}
.bfil.insider-buy.active{border-color:var(--green);color:var(--green);background:#00e67609}
.bfil.insider-sell.active{border-color:var(--red);color:var(--red);background:#ff4c4c09}

.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.sec-hdr::after{content:'';flex:1;height:1px;background:var(--border)}

.macro-strip{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.mpill{padding:4px 11px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:600;background:var(--card);cursor:default;transition:.15s}
.mpill:hover{border-color:var(--muted)}
.mpill.bull{border-color:var(--green);color:var(--green);background:#00e67607}
.mpill.bear{border-color:var(--red);color:var(--red);background:#ff4c4c07}
.mpill.neutral{color:var(--dim)}

.plays-grid{display:flex;flex-direction:column;gap:9px}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--brad);padding:13px 15px;cursor:pointer;transition:.15s;display:grid;grid-template-columns:28px 1fr;gap:0 12px;align-items:start}
.pcard:hover{border-color:var(--muted);transform:translateY(-1px)}
.pcard.long{border-left:3px solid var(--green)}
.pcard.short{border-left:3px solid var(--red)}
.pcard.primary-mkt{box-shadow:0 0 0 1px #00d4ff18}
.prank{font-size:20px;font-weight:900;color:var(--muted);align-self:center}
.ptop{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px}
.pticker{font-size:19px;font-weight:900;color:#fff}
.pdir{padding:2px 9px;border-radius:5px;font-size:10px;font-weight:800;letter-spacing:.5px}
.pdir.long{background:#00e67618;color:var(--green);border:1px solid #00e67633}
.pdir.short{background:#ff4c4c18;color:var(--red);border:1px solid #ff4c4c33}
.ptag{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;background:var(--card2);border:1px solid var(--border);color:var(--dim)}
.pstars{color:var(--gold);font-size:11px;margin-left:auto}
.pexch{font-size:9px;padding:1px 5px;border-radius:3px;background:#ffffff07;border:1px solid var(--border);color:var(--muted);font-weight:600}
.ptitle{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:5px}
.pmeta{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.ptarget{font-size:13px;font-weight:700}
.ptarget.long{color:var(--green)}
.ptarget.short{color:var(--red)}
.pnote{font-size:11px;color:var(--dim)}
.psigs{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.psig{padding:2px 6px;background:#ffffff07;border:1px solid var(--border);border-radius:3px;font-size:9px;color:var(--dim)}
.psig.insider{background:#ffd70009;border-color:#ffd70030;color:var(--gold)}


.short-list{display:flex;flex-direction:column;gap:8px}
.scard{background:var(--card);border:1px solid #ff4c4c1a;border-left:3px solid var(--red);border-radius:var(--brad);padding:11px 14px;cursor:pointer;transition:.15s}
.scard:hover{border-color:#ff4c4c44}
.stop{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.sticker{font-size:15px;font-weight:800;color:var(--red)}
.stag{padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;background:#ff4c4c15;color:var(--red);border:1px solid #ff4c4c28}
.starget{font-size:12px;font-weight:700;color:var(--red);margin-left:auto}
.stitle{font-size:11px;color:var(--dim);line-height:1.4}

/* ── MARKETS CLOSED CARD ── */
.market-closed-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;background:var(--card);border:1px solid var(--border);border-radius:var(--brad);text-align:center;gap:8px;grid-column:1/-1}
.mc-icon{font-size:36px;line-height:1}
.mc-title{font-size:16px;font-weight:800;color:var(--text);letter-spacing:.5px}
.mc-desc{font-size:12px;color:var(--dim);line-height:1.6;max-width:280px}
.mc-active{font-size:11px;color:var(--cyan);margin-top:4px;font-weight:600}
.mc-session{font-size:10px;color:var(--muted);margin-top:6px;padding:5px 10px;background:var(--surface);border-radius:5px}

/* ── ENTRY / EXIT BAR ── */
.pentry{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border-radius:7px;overflow:hidden;margin-top:9px}
.pe-col{background:var(--card2);padding:7px 8px;text-align:center}
.pe-lbl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;font-weight:700}
.pe-val{font-size:12px;font-weight:800;margin-bottom:1px;font-family:'SF Mono',monospace}
.pe-sub{font-size:8px;color:var(--dim);line-height:1.3}
.pe-val.entry{color:var(--cyan)}
.pe-val.profit{color:var(--green)}
.pe-val.stop{color:var(--orange)}
.pe-val.short-entry{color:var(--red)}
.pe-val.short-profit{color:var(--red)}
.pe-val.short-stop{color:var(--orange)}

.refresh-bar{display:flex;align-items:center;gap:7px;padding:7px 11px;background:var(--card);border:1px solid var(--border);border-radius:var(--brad);font-size:11px;color:var(--dim);margin-top:14px}
.rdot{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:pulse 2s infinite}
.rbtn{margin-left:auto;padding:3px 10px;background:none;border:1px solid var(--border);border-radius:5px;color:var(--dim);cursor:pointer;font-size:11px;transition:.15s}
.rbtn:hover{border-color:var(--cyan);color:var(--cyan)}

.skel{background:linear-gradient(90deg,var(--card) 25%,var(--border) 50%,var(--card) 75%);background-size:200%;animation:shim 1.5s infinite;border-radius:6px}
@keyframes shim{from{background-position:200% 0}to{background-position:-200% 0}}

/* ── NEWS PAGE ── */
.nfilters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.fb{padding:4px 12px;border-radius:18px;border:1px solid var(--border);background:none;color:var(--dim);cursor:pointer;font-size:11px;font-weight:600;transition:.15s}
.fb:hover{border-color:var(--text);color:var(--text)}
.fb.active{background:var(--cyan);border-color:var(--cyan);color:#000}
.swing-t{margin-left:auto;padding:4px 10px;border-radius:18px;border:1px solid var(--border);background:none;color:var(--dim);cursor:pointer;font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;transition:.15s}
.swing-t.active{border-color:var(--gold);color:var(--gold);background:#ffd70009}

.art{display:block;background:var(--card);border:1px solid var(--border);border-radius:var(--brad);padding:12px 14px;cursor:pointer;transition:.15s;margin-bottom:8px}
.art:hover{border-color:var(--muted);transform:translateY(-1px)}
.art.direct{border-left:3px solid var(--cyan)}
.art.related{border-left:3px solid var(--orange)}
.art-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.b{padding:2px 6px;border-radius:3px;font-size:9px;font-weight:800;letter-spacing:.3px;text-transform:uppercase}
.b-direct{background:#00d4ff15;color:var(--cyan);border:1px solid #00d4ff2a}
.b-related{background:#ff950015;color:var(--orange);border:1px solid #ff95002a}
.b-general{background:#ffffff08;color:var(--dim);border:1px solid #ffffff12}
.b-swing{background:#ffd70015;color:var(--gold);border:1px solid #ffd7002a}
.b-new{background:#00e67615;color:var(--green);border:1px solid #00e67630;animation:glow .8s ease infinite alternate}
@keyframes glow{from{box-shadow:none}to{box-shadow:0 0 5px var(--green)}}
.a-src{font-size:10px;color:var(--muted);margin-left:auto}
.a-time{font-size:10px;color:var(--muted)}
.a-title{font-size:13px;font-weight:600;color:#fff;line-height:1.4;margin-bottom:4px}
.a-summ{font-size:11px;color:var(--dim);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.a-tickers{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tc{display:flex;align-items:center;gap:3px;padding:1px 6px;background:#ffffff07;border:1px solid var(--border);border-radius:4px;font-size:9px;font-weight:700}
.tc .sym{color:var(--cyan)}
.tc .mt{color:var(--muted);font-weight:400}
.a-sigs{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.a-sig{padding:1px 5px;background:#ffd70009;border:1px solid #ffd7001a;border-radius:3px;font-size:9px;color:var(--gold)}
.slide-in{animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}

/* ── WATCHLIST PAGE ── */
.wl-wrap{display:flex;gap:12px;height:100%}
.wl-l{width:240px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.wl-r{flex:1;overflow-y:auto}
.s-box{position:relative;display:flex;gap:6px}
.si{flex:1;padding:8px 9px 8px 30px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;outline:none;transition:.2s}
.si:focus{border-color:var(--cyan)}
.si::placeholder{color:var(--muted)}
.s-ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.sdrop{position:absolute;top:calc(100% + 4px);left:0;right:42px;background:var(--card);border:1px solid var(--border);border-radius:7px;z-index:100;max-height:260px;overflow-y:auto;display:none}
.sdrop.open{display:block}
.sdi{display:flex;align-items:center;gap:7px;padding:8px 11px;cursor:pointer;transition:.1s}
.sdi:hover{background:var(--border)}
.sdi .dsym{font-weight:700;font-size:12px;color:var(--cyan);min-width:52px}
.sdi .dname{font-size:11px;color:var(--dim)}
.sdi .dmkt{font-size:9px;padding:1px 5px;border-radius:3px;margin-left:auto}
.add-btn{padding:8px 11px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--dim);cursor:pointer;font-size:15px;font-weight:700;transition:.15s;flex-shrink:0;line-height:1}
.add-btn:hover{border-color:var(--cyan);color:var(--cyan)}

/* Custom ticker form */
.custom-form{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px;display:none;flex-direction:column;gap:7px}
.custom-form.open{display:flex}
.cf-title{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.cf-row{display:flex;gap:6px}
.cf-in{flex:1;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;transition:.2s}
.cf-in:focus{border-color:var(--cyan)}
.cf-in::placeholder{color:var(--muted)}
.cf-sel{flex:1;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;transition:.2s}
.cf-sel:focus{border-color:var(--cyan)}
.cf-sub{padding:7px 14px;background:var(--cyan);border:none;border-radius:6px;color:#000;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.cf-sub:hover{background:#00b8e0}
.cf-cancel{background:none;border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--dim);cursor:pointer;font-size:12px}

.wl-list{flex:1;overflow-y:auto}
.wgl{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:9px 4px 3px}
.wi{display:flex;align-items:center;justify-content:space-between;padding:7px 5px;border-radius:6px;transition:.1s}
.wi:hover{background:var(--card)}
.wsym{font-size:12px;font-weight:700}
.wname{font-size:10px;color:var(--dim)}
.wrm{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 4px;border-radius:3px;font-size:12px}
.wrm:hover{color:var(--red)}
.wl-empty{padding:20px 6px;text-align:center;color:var(--muted);font-size:12px;line-height:1.7}
.mkt-stocks{background:#00d4ff14;color:var(--cyan)}
.mkt-crypto{background:#ffd70014;color:var(--gold)}
.mkt-forex{background:#00e67614;color:var(--green)}
.mkt-commodities{background:#ff950014;color:var(--orange)}
.mkt-indices{background:#aa88ff14;color:var(--purple)}
.mkt-general{background:#ffffff08;color:var(--dim)}

/* ── TOASTS ── */
.toast-wrap{position:fixed;top:54px;right:13px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;max-width:300px;pointer-events:all;box-shadow:0 8px 24px #00000099;animation:toastIn .22s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
.t-ttl{font-size:11px;font-weight:700;color:#fff;margin-bottom:2px}
.t-bod{font-size:10px;color:var(--dim);line-height:1.4}
.t-cls{float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-left:7px}

@media(max-width:600px){
  /* ── Topbar ── */
  .topbar{padding:0 10px;height:44px;gap:6px}
  .logo{font-size:13px}
  .clock-chip .t{display:none}
  .notif-label{display:none}

  /* ── Bottom tab bar ── */
  .tabbar{
    position:fixed;bottom:0;left:0;right:0;z-index:200;
    height:auto;min-height:56px;
    padding:4px 2px;
    padding-bottom:calc(4px + env(safe-area-inset-bottom,0px));
    background:var(--surface);border-top:1px solid var(--border);border-bottom:none;
    justify-content:space-around;gap:0;
  }
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;border-radius:8px;font-size:10px;min-height:44px}

  /* ── Page padding accounts for fixed bottom nav ── */
  .page{padding:12px 12px calc(68px + env(safe-area-inset-bottom,0px))}

  /* ── Brief filter: horizontal scroll strip ── */
  .brief-bar{flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .brief-bar::-webkit-scrollbar{display:none}
  .bfil{flex-shrink:0;white-space:nowrap}

  /* ── News filter: horizontal scroll strip ── */
  .nfilters{flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .nfilters::-webkit-scrollbar{display:none}
  .fb,.swing-t{flex-shrink:0;white-space:nowrap}

  /* ── Play cards ── */
  .pcard{padding:12px;cursor:default}
  .pticker{font-size:17px}


  /* ── Session banner compact ── */
  .session-banner{padding:10px 12px}
  .s-clock{font-size:16px}
  .s-name{font-size:13px}

  /* ── Watchlist: stack vertically ── */
  .wl-wrap{flex-direction:column}
  .wl-l{width:100%}
  .wl-r{min-height:180px}

  /* ── Bigger touch targets ── */
  .add-btn{min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
  .wrm{min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
  .wi{min-height:44px;padding:10px 5px}
  .sdi{min-height:44px}

  /* ── Inputs: 16px prevents Android auto-zoom on focus ── */
  input,select,textarea{font-size:16px!important}

  /* ── Toasts: full-width above bottom nav ── */
  .toast-wrap{top:auto;bottom:calc(68px + env(safe-area-inset-bottom,0px));right:10px;left:10px}
  .toast{max-width:100%}
}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo"><div class="logo-pulse"></div>MARKET<span style="color:var(--cyan)">PULSE</span></div>
  <div class="clocks" id="clocks"></div>
  <div class="ws-dot" id="wsDot"></div>
  <div class="unread" id="unread">0</div>
  <button class="notif-btn" id="notifBtn" onclick="toggleNotif()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span class="notif-label">Notify</span>
  </button>
  <button class="notif-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle light/dark theme" style="font-size:14px;padding:5px 8px">🌙</button>
</header>

<!-- TABS -->
<nav class="tabbar">
  <div class="tab active" onclick="switchTab('brief',this)">📊 Day Brief</div>
  <div class="tab" onclick="switchTab('news',this)">📡 Live Feed <span class="tab-n" id="feedN"></span></div>
  <div class="tab" onclick="switchTab('watchlist',this)">⭐ Watchlist</div>
</nav>

<div class="body">

<!-- ══════════ BRIEF ══════════ -->
<div class="page active" id="page-brief">
  <div class="session-banner">
    <div class="s-emoji" id="sEmoji">⏳</div>
    <div>
      <div class="s-name" id="sName">Loading…</div>
      <div class="s-desc" id="sDesc"></div>
      <div id="sMktBadge" style="margin-top:4px"></div>
    </div>
    <div class="s-time"><div class="s-clock" id="sClock">--:--:--</div><div class="s-date" id="sDate"></div></div>
  </div>

  <!-- Filter bar -->
  <div class="brief-bar">
    <button class="bfil active" onclick="setBriefFil('all',this)">All Plays</button>
    <button class="bfil insider-buy" onclick="setBriefFil('insider_buy',this)">🔍 Insider Buy</button>
    <button class="bfil insider-sell" onclick="setBriefFil('insider_sell',this)">🔴 Insider Sell</button>
    <span style="margin-left:auto;font-size:10px;color:var(--muted)" id="playCount"></span>
  </div>

  <div class="sec-hdr">🌍 Macro Backdrop</div>
  <div class="macro-strip" id="macroStrip">
    <div class="mpill neutral skel" style="width:130px;height:26px">&nbsp;</div>
    <div class="mpill neutral skel" style="width:110px;height:26px">&nbsp;</div>
    <div class="mpill neutral skel" style="width:150px;height:26px">&nbsp;</div>
  </div>

  <div class="sec-hdr" style="margin-top:4px" id="longsHdr">🟢 Day Trade Longs — Buy Now → 2hr Target</div>
  <div class="plays-grid" id="longsGrid">
    <div class="pcard skel" style="height:88px"></div>
    <div class="pcard skel" style="height:88px"></div>
    <div class="pcard skel" style="height:88px"></div>
  </div>

  <div class="sec-hdr" style="margin-top:18px">🔴 Avoid / Short — 2hr Downside</div>
  <div class="short-list" id="shortList">
    <div class="scard skel" style="height:56px"></div>
  </div>

  <div class="refresh-bar" id="refreshBar" style="margin-top:14px">
    <div class="rdot"></div>
    <span>Auto-refreshes every 15 min</span>
    <span id="lastUp" style="margin-left:6px;opacity:.6"></span>
    <button class="rbtn" onclick="loadBrief()">↺ Refresh Now</button>
  </div>

</div>

<!-- ══════════ NEWS ══════════ -->
<div class="page" id="page-news">
  <div class="nfilters">
    <button class="fb active" onclick="setFil('all',this)">All</button>
    <button class="fb" onclick="setFil('stocks',this)">Stocks</button>
    <button class="fb" onclick="setFil('crypto',this)">Crypto</button>
    <button class="fb" onclick="setFil('forex',this)">Forex</button>
    <button class="fb" onclick="setFil('commodities',this)">Commodities</button>
    <button class="fb" onclick="setFil('indices',this)">Indices</button>
    <button class="swing-t" id="swingT" onclick="toggleSwing()">⚡ Day Trade Only</button>
  </div>
  <div id="newsFeed"></div>
</div>

<!-- ══════════ WATCHLIST ══════════ -->
<div class="page" id="page-watchlist">
  <div class="wl-wrap">
    <div class="wl-l">
      <div class="s-box" id="sBox">
        <svg class="s-ico" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="si" id="si" placeholder="Search ticker… BHP, 0700, AAPL"
          oninput="onSearch(this.value)" onkeydown="onKey(event)" autocomplete="off" spellcheck="false"/>
        <div class="sdrop" id="sdrop"></div>
        <button class="add-btn" onclick="toggleCustomForm()" title="Add custom ticker">+</button>
      </div>

      <!-- Custom ticker form -->
      <div class="custom-form" id="customForm">
        <div class="cf-title">Add Custom Ticker</div>
        <div class="cf-row">
          <input class="cf-in" id="ctSym" placeholder="Symbol (e.g. 0700)" style="text-transform:uppercase"/>
          <input class="cf-in" id="ctName" placeholder="Name (e.g. Tencent)"/>
        </div>
        <div class="cf-row">
          <select class="cf-sel" id="ctMkt">
            <option value="stocks">Stocks</option>
            <option value="crypto">Crypto</option>
            <option value="forex">Forex</option>
            <option value="commodities">Commodities</option>
            <option value="indices">Indices</option>
          </select>
          <select class="cf-sel" id="ctEx">
            <option value="ASX">ASX (AU)</option>
            <option value="HKEX">HKEX (HK)</option>
            <option value="SGX">SGX (SG)</option>
            <option value="NYSE">NYSE (US)</option>
            <option value="NASDAQ">NASDAQ (US)</option>
            <option value="">Other</option>
          </select>
        </div>
        <div class="cf-row">
          <button class="cf-sub" onclick="addCustomTicker()">Add & Watch</button>
          <button class="cf-cancel" onclick="toggleCustomForm()">Cancel</button>
        </div>

      <div class="wl-list" id="wlList"></div>
    </div>
    <div class="wl-r" id="wlNews"></div>
  </div>
</div>

</div><!-- /body -->
</div><!-- /app -->

<div class="toast-wrap" id="toastWrap"></div>

<script>
// ─── Theme ───────────────────────────────────────────────────────────────────
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'light' ? '☀️' : '🌙';
}
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  localStorage.setItem('theme', next);
  applyTheme(next);
}
applyTheme(localStorage.getItem('theme') || 'dark');

// ─── State ───────────────────────────────────────────────────────────────────
let allArticles = [], watchlist = [], tickerMkt = {};
let curFil = 'all', swingOnly = false, notifOn = false;
let unread = 0, ws = null, reconnT = null, briefT = null;
let briefFil = 'all', currentBrief = null;
const userTz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';

// ─── Session-based sort ───────────────────────────────────────────────────────
function getPrimaryExchanges() {
  const sgtH = parseInt(new Intl.DateTimeFormat('en-US', {
    timeZone: 'Asia/Singapore', hour: 'numeric', hour12: false,
  }).format(new Date()));
  if (sgtH >= 20) return ['NYSE','NASDAQ'];
  if (sgtH >= 9)  return ['HKEX','SGX'];
  return ['ASX'];
}

function getMktLabel() {
  const ex = getPrimaryExchanges();
  if (ex.includes('ASX'))    return { label: '🇦🇺 AU Session', cls: 'au' };
  if (ex.includes('HKEX'))   return { label: '🇭🇰 HK/SG Session', cls: 'hk_sg' };
  return { label: '🇺🇸 US Session', cls: 'us' };
}

function sortBySession(plays) {
  const primary = getPrimaryExchanges();
  return [...plays].sort((a, b) => {
    const ap = primary.includes(a.exchange) ? 1 : 0;
    const bp = primary.includes(b.exchange) ? 1 : 0;
    if (bp !== ap) return bp - ap;
    return (b.stars || 0) - (a.stars || 0) || parseFloat(b.upMax||0) - parseFloat(a.upMax||0);
  });
}

// ─── Brief filter ─────────────────────────────────────────────────────────────
function setBriefFil(fil, btn) {
  briefFil = fil;
  document.querySelectorAll('.bfil').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentBrief) renderBrief(currentBrief);
}

function applyBriefFil(plays) {
  if (briefFil === 'insider_buy')  return plays.filter(p => (p.signals||[]).includes('insider buying'));
  if (briefFil === 'insider_sell') return plays.filter(p => (p.signals||[]).includes('insider selling'));
  return plays;
}

// ─── Clocks ───────────────────────────────────────────────────────────────────
const EX = [
  {id:'NYSE', lbl:'NY',  tz:'America/New_York', oh:9,  om:30, ch:16, cm:0},
  {id:'SGX',  lbl:'SIN', tz:'Asia/Singapore',   oh:9,  om:0,  ch:17, cm:30},
  {id:'LSE',  lbl:'LON', tz:'Europe/London',    oh:8,  om:0,  ch:16, cm:30},
  {id:'TSE',  lbl:'TKY', tz:'Asia/Tokyo',       oh:9,  om:0,  ch:15, cm:30},
  {id:'HKEX', lbl:'HK',  tz:'Asia/Hong_Kong',   oh:9,  om:30, ch:16, cm:0},
  {id:'ASX',  lbl:'ASX', tz:'Australia/Sydney', oh:10, om:0,  ch:16, cm:0},
  {id:'BTC',  lbl:'BTC', tz:'UTC',              oh:0,  om:0,  ch:0,  cm:0, always:true},
];

function exStatus(ex) {
  if (ex.always) return 'open';
  const now = new Date();
  const p = new Intl.DateTimeFormat('en-US',{timeZone:ex.tz,hour:'numeric',minute:'numeric',hour12:false,weekday:'short'}).formatToParts(now);
  const g = t => parseInt(p.find(x=>x.type===t)?.value||'0');
  const wd = p.find(x=>x.type==='weekday')?.value;
  if (wd==='Sat'||wd==='Sun') return 'closed';
  const m = g('hour')*60+g('minute');
  const o = ex.oh*60+ex.om, c = ex.ch*60+ex.cm;
  if (m>=o && m<c) return 'open';
  if (m>=o-90 && m<o) return 'pre';
  return 'closed';
}

function tzFmt(tz) {
  return new Intl.DateTimeFormat('en-GB',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date());
}

function updateClocks() {
  document.getElementById('clocks').innerHTML = EX.map(ex=>{
    const s = exStatus(ex);
    const dot = s==='open'?'●':s==='pre'?'◑':'○';
    return `<div class="clock-chip ${s}">${dot} ${ex.lbl} <span class="t">${tzFmt(ex.tz)}</span></div>`;
  }).join('');

  const now = new Date();
  const cl = document.getElementById('sClock');
  const cd = document.getElementById('sDate');
  if(cl) cl.textContent = new Intl.DateTimeFormat('en-GB',{timeZone:userTz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(now);
  if(cd) cd.textContent = new Intl.DateTimeFormat('en-GB',{timeZone:userTz,weekday:'long',year:'numeric',month:'long',day:'numeric'}).format(now);
}
setInterval(updateClocks,1000);
updateClocks();

// ─── Brief ───────────────────────────────────────────────────────────────────
async function loadBrief() {
  try {
    const r = await fetch('/api/brief?tz='+encodeURIComponent(userTz));
    const b = await r.json();
    currentBrief = b;
    renderBrief(b);
    if(briefT) clearTimeout(briefT);
    briefT = setTimeout(loadBrief, 15*60*1000);
  } catch(e){ console.warn('Brief err',e); }
}

function st(n){ return '★'.repeat(n)+'☆'.repeat(5-n); }

function renderBrief(b) {
  document.getElementById('sEmoji').textContent = b.session.emoji;
  document.getElementById('sName').textContent  = b.session.name;
  document.getElementById('sDesc').textContent  = b.session.desc;

  // Active market badge
  const ml = getMktLabel();
  document.getElementById('sMktBadge').innerHTML = `<span class="s-mkt ${ml.cls}">${ml.label} — at forefront</span>`;

  // Macro
  const ms = document.getElementById('macroStrip');
  if(b.macroBackdrop && b.macroBackdrop.length) {
    ms.innerHTML = b.macroBackdrop.map(m=>{
      const sigs=m.signals||[];
      const bull=sigs.some(s=>['rate cut','cpi','jobs report','nonfarm payroll','gdp'].includes(s));
      const bear=sigs.some(s=>['rate hike','guidance lowered','downgrade'].includes(s));
      const cls=bull?'bull':bear?'bear':'neutral';
      const ico=bull?'▲':bear?'▼':'→';
      const short=m.title.replace(/^[^:]+:\s*/,'').slice(0,60);
      return `<div class="mpill ${cls}" title="${esc(m.title)}">${ico} ${esc(short)}</div>`;
    }).join('');
  } else { ms.innerHTML='<div class="mpill neutral">No macro signals in last 24h</div>'; }

  // Apply filter + session sort
  const primaryEx = getPrimaryExchanges();
  const rawLongs  = applyBriefFil(b.longs  || []);
  const rawShorts = applyBriefFil(b.shorts || []);
  const longs  = sortBySession(rawLongs);
  const shorts = sortBySession(rawShorts);

  // Markets closed state
  const lg = document.getElementById('longsGrid');
  const sl = document.getElementById('shortList');
  if (b.marketsClosed) {
    const alwaysOn = (b.marketStatus || [])
      .filter(ex => ex.status && (ex.status.open || ex.always))
      .map(ex => ex.icon + ' ' + ex.name).join('  ');
    document.getElementById('playCount').textContent = 'Markets closed';
    lg.innerHTML = `<div class="market-closed-card">
      <div class="mc-icon">🌙</div>
      <div class="mc-title">Markets Closed</div>
      <div class="mc-desc">All major exchanges are closed right now.<br>Recommendations will reappear at next market open.</div>
      ${alwaysOn ? `<div class="mc-active">24/7 Active: ${esc(alwaysOn)}</div>` : ''}
      <div class="mc-session">${esc(b.session.emoji)} ${esc(b.session.name)} &mdash; ${esc(b.session.desc)}</div>
    </div>`;
    sl.innerHTML = '<div style="color:var(--dim);padding:10px;font-size:11px">Short setups will appear when markets open</div>';
    const lu = new Intl.DateTimeFormat('en-GB',{timeZone:userTz,hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(b.generatedAt));
    document.getElementById('lastUp').textContent = `Updated ${lu} local`;
    return;
  }

  document.getElementById('playCount').textContent = `${longs.length} long · ${shorts.length} short`;

  // Longs
  if(longs.length) {
    lg.innerHTML = longs.map((p,i)=>{
      const isPrimary = primaryEx.includes(p.exchange);
      return `
      <div class="pcard long${isPrimary?' primary-mkt':''}">
        <div class="prank">${i+1}</div>
        <div>
          <div class="ptop">
            <span class="pticker">${esc(p.ticker)}</span>
            ${p.exchange?`<span class="pexch">${esc(p.exchange)}</span>`:''}
            <span class="pdir long">▲ LONG</span>
            <span class="ptag">${esc(p.tag)}</span>
            <span class="pstars" style="margin-left:auto">${st(p.stars)}</span>
          </div>
          <div class="ptitle">${esc(p.title)}</div>
          <div class="pmeta">
            <span class="ptarget long">▲ +${p.upMin}–${p.upMax}% · 2hr target</span>
            <span class="pnote">${esc(p.note)}</span>
          </div>
          <div class="pentry">
            <div class="pe-col">
              <div class="pe-lbl">ENTRY</div>
              <div class="pe-val entry">${esc(p.entryZone||'At open')}</div>
              <div class="pe-sub">${esc(p.entryMethod||'Enter at open')}</div>
            </div>
            <div class="pe-col">
              <div class="pe-lbl">TARGET · SELL</div>
              <div class="pe-val profit">+${p.upMax}%</div>
              <div class="pe-sub">2hr take-profit exit</div>
            </div>
            <div class="pe-col">
              <div class="pe-lbl">STOP LOSS</div>
              <div class="pe-val stop">−${p.stopPct}%</div>
              <div class="pe-sub">R:R&nbsp;${p.rrRatio}:1</div>
            </div>
          </div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">${(p.signals||[]).map(s=>`<span class="psig${s.includes('insider')?' insider':''}">${esc(s)}</span>`).join('')}</div>
          <div style="margin-top:5px">
            <a href="${p.articleUrl||'#'}" target="_blank" rel="noopener" style="font-size:10px;color:var(--dim);text-decoration:none" onclick="event.stopPropagation()">Read full story →</a>
          </div>
        </div>
      </div>`;
    }).join('');
  } else {
    lg.innerHTML='<div style="color:var(--dim);padding:14px;font-size:12px">No setups match — try "All Plays" or add tickers to your watchlist</div>';
  }

  // Shorts
  if(shorts.length) {
    sl.innerHTML = shorts.map(p=>`
      <div class="scard">
        <div class="stop">
          <span class="sticker">${esc(p.ticker)}</span>
          ${p.exchange?`<span style="font-size:9px;color:var(--muted);padding:1px 5px;border:1px solid var(--border);border-radius:3px">${esc(p.exchange)}</span>`:''}
          <span class="stag">${esc(p.tag)}</span>
          <span class="starget">▼ ${p.upMin}–${p.upMax}% · 2hr</span>
        </div>
        <div class="stitle">${esc(p.title)}</div>
        <div class="pentry" style="margin-top:7px">
          <div class="pe-col">
            <div class="pe-lbl">SHORT ENTRY</div>
            <div class="pe-val short-entry">${esc(p.entryZone||'At open')}</div>
            <div class="pe-sub">${esc(p.entryMethod||'Short at open')}</div>
          </div>
          <div class="pe-col">
            <div class="pe-lbl">COVER · BUY BACK</div>
            <div class="pe-val short-profit">−${p.upMax}%</div>
            <div class="pe-sub">2hr cover target</div>
          </div>
          <div class="pe-col">
            <div class="pe-lbl">STOP LOSS</div>
            <div class="pe-val short-stop">+${p.stopPct}%</div>
            <div class="pe-sub">R:R&nbsp;${p.rrRatio}:1</div>
          </div>
        </div>
        <div style="margin-top:5px">
          <a href="${p.articleUrl||'#'}" target="_blank" rel="noopener" style="font-size:10px;color:var(--dim)" onclick="event.stopPropagation()">Read full story →</a>
        </div>
      </div>`).join('');
  } else { sl.innerHTML='<div style="color:var(--dim);padding:10px;font-size:11px">No short setups flagged</div>'; }

  const lu = new Intl.DateTimeFormat('en-GB',{timeZone:userTz,hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(b.generatedAt));
  document.getElementById('lastUp').textContent = `Updated ${lu} local`;
}

// ─── News Feed ────────────────────────────────────────────────────────────────
function filtered() {
  let list = allArticles;
  if(curFil!=='all') list = list.filter(a=>(a.sourceMkt===curFil)||((a.matches||[]).some(m=>tickerMkt[m.ticker]===curFil)));
  if(swingOnly) list = list.filter(a=>a.isSwingRelevant);
  return list;
}

function renderNews() {
  const f = document.getElementById('newsFeed');
  const list = filtered();
  if(!list.length){ f.innerHTML='<div style="color:var(--dim);padding:30px;text-align:center;font-size:12px">No articles yet — loading…</div>'; return; }
  f.innerHTML = list.map(a=>artHTML(a)).join('');
}

function artHTML(a, isNew=false) {
  const mt=a.matchType||'general';
  const time=timeAgo(a.publishedAt);
  let b='';
  if(isNew) b+=`<span class="b b-new">NEW</span>`;
  if(mt==='direct') b+=`<span class="b b-direct">DIRECT</span>`;
  else if(mt==='related') b+=`<span class="b b-related">RELATED</span>`;
  else b+=`<span class="b b-general">MKT</span>`;
  if(a.isSwingRelevant) b+=`<span class="b b-swing">⚡DAY TRADE</span>`;
  const ticks=(a.matches||[]).slice(0,4).map(m=>`<span class="tc"><span class="sym">${esc(m.ticker)}</span><span class="mt">${m.matchType==='direct'?'▲':'~'}</span></span>`).join('');
  const sigs=(a.swingSignals||[]).slice(0,3).map(s=>`<span class="a-sig">${esc(s)}</span>`).join('');
  const summ=a.summary?`<div class="a-summ">${esc(a.summary)}</div>`:'';
  return `<a class="art ${mt}${isNew?' slide-in':''}" href="${a.url||'#'}" target="_blank" rel="noopener">
    <div class="art-top">${b}<span class="a-src">${esc(a.source)}</span><span class="a-time">${time}</span></div>
    <div class="a-title">${esc(a.title)}</div>${summ}
    ${ticks?`<div class="a-tickers">${ticks}</div>`:''}
    ${sigs?`<div class="a-sigs">${sigs}</div>`:''}
  </a>`;
}

function prependNews(articles) {
  if(!document.getElementById('page-news').classList.contains('active')) return;
  const feed=document.getElementById('newsFeed');
  const list=filtered();
  for(const a of [...articles].reverse()) {
    if(!list.includes(a)) continue;
    const el=document.createElement('div');
    el.innerHTML=artHTML(a,true);
    if(el.firstElementChild) feed.insertBefore(el.firstElementChild,feed.firstChild);
  }
}

function setFil(mkt,btn) {
  curFil=mkt;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderNews();
}
function toggleSwing() {
  swingOnly=!swingOnly;
  document.getElementById('swingT').classList.toggle('active',swingOnly); renderNews();
}

// ─── Watchlist ────────────────────────────────────────────────────────────────
async function loadWl() {
  const r=await fetch('/api/watchlist'); watchlist=await r.json();
  for(const w of watchlist) tickerMkt[w.ticker]=w.market;
  renderWl(); renderWlNews();
}

function renderWl() {
  const el=document.getElementById('wlList');
  if(!watchlist.length){ el.innerHTML='<div class="wl-empty">Search above to add tickers.<br>Or use + to add custom symbols.<br><br>Stocks · Crypto · Forex<br>ASX · HKEX · SGX</div>'; return; }
  const grp={};
  for(const w of watchlist){ const m=w.market||'other'; if(!grp[m])grp[m]=[]; grp[m].push(w); }
  let html='';
  for(const mkt of ['stocks','crypto','forex','commodities','indices','other']) {
    if(!grp[mkt]) continue;
    html+=`<div class="wgl">${mkt}</div>`;
    for(const w of grp[mkt]) html+=`<div class="wi"><div><div class="wsym">${esc(w.ticker)}</div><div class="wname">${esc((w.name||'').slice(0,22))}${w.exchange?` · ${w.exchange}`:''}</div></div><button class="wrm" onclick="removeTk('${w.ticker}')">×</button></div>`;
  }
  el.innerHTML=html;
}

function renderWlNews() {
  const el=document.getElementById('wlNews');
  if(!watchlist.length){ el.innerHTML='<div style="color:var(--dim);padding:18px;text-align:center;font-size:12px">Add tickers to see filtered news here</div>'; return; }
  const rel=allArticles.filter(a=>a.matchType!=='general').slice(0,60);
  el.innerHTML=rel.length ? rel.map(a=>artHTML(a)).join('') : '<div style="color:var(--dim);padding:18px;text-align:center;font-size:12px">No matched news yet</div>';
}

let sT=null;
async function onSearch(q) {
  clearTimeout(sT);
  const d=document.getElementById('sdrop');
  if(!q.trim()){d.classList.remove('open');return;}
  sT=setTimeout(async()=>{
    const data=await fetch('/api/tickers?q='+encodeURIComponent(q)).then(r=>r.json());
    if(!data.length){d.classList.remove('open');return;}
    d.innerHTML=data.map(x=>`<div class="sdi" onclick="addTk('${x.ticker}')"><span class="dsym">${esc(x.ticker)}</span><span class="dname">${esc(x.name)}</span><span class="dmkt mkt-${x.market}">${x.market}</span></div>`).join('');
    d.classList.add('open');
  },200);
}
function onKey(e) {
  if(e.key==='Escape') document.getElementById('sdrop').classList.remove('open');
  if(e.key==='Enter'){const f=document.querySelector('.sdi');if(f)f.click();}
}
document.addEventListener('click',e=>{
  if(!document.getElementById('sBox').contains(e.target)) document.getElementById('sdrop').classList.remove('open');
});

async function addTk(ticker) {
  const r=await fetch('/api/watchlist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ticker})});
  const d=await r.json();
  if(d.error){toast('Error',d.error,'red');return;}
  watchlist.push({ticker,...d.info});
  if(d.info) tickerMkt[ticker]=d.info.market;
  document.getElementById('si').value='';
  document.getElementById('sdrop').classList.remove('open');
  renderWl(); renderWlNews(); toast('Added',ticker+' added to watchlist','cyan');
  loadBrief();
}

async function removeTk(ticker) {
  await fetch('/api/watchlist/'+ticker,{method:'DELETE'});
  watchlist=watchlist.filter(w=>w.ticker!==ticker);
  delete tickerMkt[ticker];
  renderWl(); renderWlNews(); loadBrief();
}

// Custom ticker form
function toggleCustomForm() {
  document.getElementById('customForm').classList.toggle('open');
}

async function addCustomTicker() {
  const sym  = document.getElementById('ctSym').value.trim().toUpperCase();
  const name = document.getElementById('ctName').value.trim();
  const mkt  = document.getElementById('ctMkt').value;
  const ex   = document.getElementById('ctEx').value;
  if (!sym || !name) { toast('Error', 'Symbol and Name required', 'red'); return; }

  // Register in DB
  const r = await fetch('/api/tickers/custom', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ ticker:sym, name, market:mkt, exchange:ex }),
  });
  const d = await r.json();
  if (d.error) { toast('Error', d.error, 'red'); return; }

  // Auto-add to watchlist
  await addTk(sym);
  document.getElementById('ctSym').value = '';
  document.getElementById('ctName').value = '';
  document.getElementById('customForm').classList.remove('open');
  toast('Custom Ticker', sym+' added as custom ticker & watchlisted', 'cyan');
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connect() {
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(proto+'://'+location.host);
  ws.onopen=()=>{ document.getElementById('wsDot').classList.add('live'); if(reconnT){clearTimeout(reconnT);reconnT=null;} };
  ws.onmessage=e=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='init'||msg.type==='refresh'){
      allArticles=msg.data; renderNews(); renderWlNews(); loadBrief();
    } else if(msg.type==='new_articles'){
      allArticles.unshift(...msg.data);
      if(allArticles.length>600) allArticles=allArticles.slice(0,600);
      prependNews(msg.data); bumpUnread(msg.data.length);
      if(notifOn) notify(msg.data); loadBrief();
    }
  };
  ws.onclose=()=>{ document.getElementById('wsDot').classList.remove('live'); reconnT=setTimeout(connect,4000); };
  ws.onerror=()=>ws.close();
}

// ─── Notifications ────────────────────────────────────────────────────────────
async function toggleNotif() {
  if(notifOn){notifOn=false;document.getElementById('notifBtn').classList.remove('on');toast('Notifications','Disabled','dim');return;}
  const p=await Notification.requestPermission();
  if(p==='granted'){notifOn=true;document.getElementById('notifBtn').classList.add('on');toast('Notifications','Enabled — alerts for day trade signals','cyan');}
  else toast('Blocked','Allow notifications in browser settings','red');
}
function notify(articles) {
  for(const a of articles.slice(0,2)){
    if(!a.isSwingRelevant&&a.matchType==='general') continue;
    try{new Notification('MarketPulse ⚡ '+a.source,{body:a.title,tag:a.url});}catch(_){}
  }
}
function bumpUnread(n) {
  unread+=n;
  const el=document.getElementById('unread'); el.textContent=unread>99?'99+':unread; el.classList.add('show');
  const fn=document.getElementById('feedN'); fn.textContent=unread>99?'99+':unread;
}
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){unread=0;document.getElementById('unread').classList.remove('show');document.getElementById('feedN').textContent='';}
});

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(id,btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active'); btn.classList.add('active');
  if(id==='news') renderNews();
  if(id==='watchlist'){renderWl();renderWlNews();}
}

// ─── Toast ───────────────────────────────────────────────────────────────────
function toast(title,body,color='cyan') {
  const bc=color==='cyan'?'#00d4ff':color==='red'?'#ff4c4c':color==='orange'?'#f5831f':'#44445a';
  const w=document.getElementById('toastWrap');
  const el=document.createElement('div'); el.className='toast'; el.style.borderLeft='3px solid '+bc;
  el.innerHTML=`<button class="t-cls" onclick="this.parentElement.remove()">×</button><div class="t-ttl">${esc(title)}</div><div class="t-bod">${esc(body)}</div>`;
  w.appendChild(el); setTimeout(()=>el.remove(),6000);
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function timeAgo(iso){const s=Math.floor((Date.now()-new Date(iso))/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}

// ─── Init ─────────────────────────────────────────────────────────────────────
(async()=>{ await loadWl(); connect(); loadBrief(); })();
</script>
