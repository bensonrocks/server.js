<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Account Settings — CirroSys</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/theme.css">
<style>
  .page{ max-width: 620px; }
  .card{ margin-bottom: 20px; }
  .card-title{ font-family: var(--mono); font-size: .64rem; letter-spacing: .12em; text-transform: uppercase; color: var(--text-3); margin-bottom: 16px; }
  .info-row{ display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: .88rem; }
  .info-row:last-child{ border-bottom: none; }
  .info-label{ color: var(--text-2); }
  .info-val{ font-family: var(--mono); font-weight: 600; }
  .btn-save{ margin-top: 4px; }

  .member-row{ display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .member-row:last-child{ border-bottom: none; }
  .member-name{ font-weight: 600; font-size: .88rem; }
  .member-email{ font-family: var(--mono); font-size: .76rem; color: var(--text-2); }
  .member-right{ display: flex; align-items: center; gap: 10px; }
  .invite-form{ display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; margin-top: 16px; align-items: end; }
  @media(max-width:640px){ .invite-form{ grid-template-columns: 1fr; } }
  .invite-form label{ margin-bottom: 4px; }
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="/dashboard">
    <span class="brand-mark"></span>
    Cirro<em>Sys</em>
  </a>
  <div class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/billing">Billing</a>
    <a class="active" href="/settings">Settings</a>
  </div>
  <div></div>
</div>

<div class="page">
  <div class="page-title">Account Settings</div>
  <div class="page-sub">Manage your profile, organization and team.</div>
  <div style="height:22px"></div>

  <div class="card">
    <div class="card-title">Account</div>
    <div class="info-row"><span class="info-label">Email</span><span class="info-val" id="u-email">—</span></div>
    <div class="info-row"><span class="info-label">Role</span><span class="info-val" id="u-role">—</span></div>
    <div class="info-row"><span class="info-label">Client Since</span><span class="info-val" id="u-since">—</span></div>
  </div>

  <div class="card">
    <div class="card-title">Profile</div>
    <form id="profile-form">
      <div class="field"><label>Full Name</label><input id="f-name" required></div>
      <button class="btn-primary btn-save" type="submit">Save Name</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>

  <div class="card">
    <div class="card-title">Organization</div>
    <form id="org-form">
      <div class="field"><label>Organization Name</label><input id="f-org-name" required></div>
      <button class="btn-primary btn-save" type="submit" id="org-save-btn">Save Organization Name</button>
      <div class="msg" id="org-msg"></div>
    </form>
  </div>

  <div class="card">
    <div class="card-title">Team</div>
    <div id="members-list"></div>
    <div id="invite-block" style="display:none">
      <div class="section-label" style="margin-top:20px">Add Teammate</div>
      <div class="invite-form">
        <div class="field" style="margin-bottom:0"><label>Name</label><input id="inv-name"></div>
        <div class="field" style="margin-bottom:0"><label>Email</label><input id="inv-email" type="email"></div>
        <div class="field" style="margin-bottom:0"><label>Password</label><input id="inv-password" type="password"></div>
        <button class="btn-primary" onclick="addTeammate()" type="button">Add</button>
      </div>
      <div class="msg" id="team-msg"></div>
    </div>
  </div>
</div>

<script>
function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
let currentUserId = null;

fetch('/api/auth/me').then(r=>r.json()).then(d=>{
  if(!d.user){ location.href='/login'; return; }
  currentUserId = d.user.id;
  document.getElementById('u-email').textContent = d.user.email;
  document.getElementById('u-role').textContent = d.user.role === 'owner' ? 'Owner' : 'Member';
  document.getElementById('u-since').textContent = d.user.createdAt ? new Date(d.user.createdAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
  document.getElementById('f-name').value = d.user.name;
  if(d.organization) document.getElementById('f-org-name').value = d.organization.name;
  if(d.user.role !== 'owner'){
    document.getElementById('f-org-name').disabled = true;
    document.getElementById('org-save-btn').style.display = 'none';
  }
  loadTeam();
});

document.getElementById('profile-form').addEventListener('submit', async e => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  msg.style.display = 'none';
  try {
    const res = await fetch('/api/account/update', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name: document.getElementById('f-name').value })
    });
    const data = await res.json();
    if(!data.ok){ msg.textContent = data.error || 'An error occurred.'; msg.className='msg err'; msg.style.display='block'; return; }
    msg.textContent = 'Profile updated.'; msg.className='msg ok'; msg.style.display='block';
  } catch {
    msg.textContent = 'Network error — please try again.'; msg.className='msg err'; msg.style.display='block';
  }
});

document.getElementById('org-form').addEventListener('submit', async e => {
  e.preventDefault();
  const msg = document.getElementById('org-msg');
  msg.style.display = 'none';
  try {
    const res = await fetch('/api/organization', {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name: document.getElementById('f-org-name').value })
    });
    const data = await res.json();
    if(!data.ok){ msg.textContent = data.error || 'An error occurred.'; msg.className='msg err'; msg.style.display='block'; return; }
    msg.textContent = 'Organization updated.'; msg.className='msg ok'; msg.style.display='block';
  } catch {
    msg.textContent = 'Network error — please try again.'; msg.className='msg err'; msg.style.display='block';
  }
});

async function loadTeam(){
  const res = await fetch('/api/team');
  const data = await res.json();
  if(!data.ok) return;

  document.getElementById('invite-block').style.display = data.isOwner ? 'block' : 'none';

  document.getElementById('members-list').innerHTML = data.members.map(m => `
    <div class="member-row">
      <div>
        <div class="member-name">${esc(m.name)}</div>
        <div class="member-email">${esc(m.email)}</div>
      </div>
      <div class="member-right">
        <span class="badge ${m.role}">${esc(m.role)}</span>
        ${(data.isOwner && m.role !== 'owner') ? `<button class="btn-danger-outline" onclick="removeTeammate('${m.id}','${esc(m.name)}')">Remove</button>` : ''}
      </div>
    </div>
  `).join('');
}

async function addTeammate(){
  const msg = document.getElementById('team-msg');
  msg.style.display = 'none';
  const name = document.getElementById('inv-name').value;
  const email = document.getElementById('inv-email').value;
  const password = document.getElementById('inv-password').value;
  try {
    const res = await fetch('/api/team', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if(!data.ok){ msg.textContent = data.error; msg.className='msg err'; msg.style.display='block'; return; }
    document.getElementById('inv-name').value = '';
    document.getElementById('inv-email').value = '';
    document.getElementById('inv-password').value = '';
    msg.textContent = 'Teammate added.'; msg.className='msg ok'; msg.style.display='block';
    loadTeam();
  } catch {
    msg.textContent = 'Network error — please try again.'; msg.className='msg err'; msg.style.display='block';
  }
}

async function removeTeammate(id, name){
  if(!confirm(`Remove ${name} from your organization?`)) return;
  const res = await fetch(`/api/team/${id}`, { method:'DELETE' });
  const data = await res.json();
  if(data.ok) loadTeam(); else alert(data.error || 'Error');
}
</script>
</body>
</html>
