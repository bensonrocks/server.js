<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Account Settings — CirroSys</title>
<meta name="robots" content="noindex">
<style>
  :root{--bg:#080b11;--surface:#131926;--border:rgba(255,255,255,.09);--text:#e6ecf2;--text-2:#8b95a5;--text-3:#4f5866;--accent:#3aa0ff;--accent-2:#00d4b8;--red:#ff4d6a;--mono:'Courier New',Courier,monospace;--sans:system-ui,-apple-system,'Segoe UI',sans-serif}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:15px}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
  .topbar{background:#0a0e15;border-bottom:1px solid rgba(255,255,255,.07);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .brand{display:flex;align-items:center;gap:9px;font-size:.95rem;font-weight:800;letter-spacing:.06em;text-decoration:none}
  .brand-dot{width:9px;height:9px;border-radius:50%;background:var(--accent-2);box-shadow:0 0 8px var(--accent-2)}
  .brand-first{color:#fff}.brand-second{color:var(--accent)}
  .nav{display:flex;align-items:center;gap:2px}
  .nav a{font-size:.82rem;color:var(--text-2);padding:8px 14px;text-decoration:none;border-radius:6px;transition:color .15s,background .15s}
  .nav a:hover{color:var(--text);background:rgba(255,255,255,.05)}
  .nav a.active{color:var(--text);background:rgba(58,160,255,.12)}
  @media(max-width:760px){.nav{display:none}}

  .page{flex:1;max-width:560px;width:100%;margin:0 auto;padding:48px 24px}
  h1{font-size:1.4rem;font-weight:700;margin-bottom:4px}
  .sub{font-size:.85rem;color:var(--text-2);margin-bottom:32px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:20px}
  .card-title{font-family:var(--mono);font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-3);margin-bottom:16px}
  .field{margin-bottom:16px}
  label{display:block;font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-2);margin-bottom:6px}
  input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-size:.86rem;outline:none;transition:border-color .15s}
  input:focus{border-color:var(--accent)}
  input:disabled{color:var(--text-2)}
  .info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:.88rem}
  .info-row:last-child{border-bottom:none}
  .info-label{color:var(--text-2)}
  .info-val{font-family:var(--mono);font-weight:600}
  .btn-save{background:var(--accent-2);color:#00251d;font-weight:700;font-size:.86rem;padding:10px 20px;border-radius:6px;border:none;cursor:pointer}
  .btn-save:hover{opacity:.85}
  .msg{font-size:.82rem;padding:10px 14px;border-radius:6px;margin-top:14px;display:none}
  .msg.err{background:rgba(255,77,106,.1);border:1px solid rgba(255,77,106,.3);color:var(--red)}
  .msg.ok{background:rgba(0,212,184,.1);border:1px solid rgba(0,212,184,.3);color:var(--accent-2)}
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="/dashboard">
    <span class="brand-dot"></span>
    <span class="brand-first">Cirro</span><span class="brand-second">Sys</span>
  </a>
  <div class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/billing">Billing</a>
    <a class="active" href="/settings">Settings</a>
  </div>
  <div></div>
</div>

<div class="page">
  <h1>Account Settings</h1>
  <p class="sub">Manage your CirroSys client profile.</p>

  <div class="card">
    <div class="card-title">Account</div>
    <div class="info-row"><span class="info-label">Email</span><span class="info-val" id="u-email">—</span></div>
    <div class="info-row"><span class="info-label">Client Since</span><span class="info-val" id="u-since">—</span></div>
  </div>

  <div class="card">
    <div class="card-title">Profile</div>
    <form id="profile-form">
      <div class="field"><label>Full Name</label><input id="f-name" required></div>
      <div class="field"><label>Company</label><input id="f-company" placeholder="Your company"></div>
      <button class="btn-save" type="submit">Save Changes</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>
</div>

<script>
fetch('/api/auth/me').then(r=>r.json()).then(d=>{
  if(!d.user){ location.href='/login'; return; }
  document.getElementById('u-email').textContent = d.user.email;
  document.getElementById('u-since').textContent = d.user.createdAt ? new Date(d.user.createdAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
  document.getElementById('f-name').value = d.user.name;
  document.getElementById('f-company').value = d.user.company || '';
});

document.getElementById('profile-form').addEventListener('submit', async e => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  msg.style.display = 'none';
  try {
    const res = await fetch('/api/account/update', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name: document.getElementById('f-name').value, company: document.getElementById('f-company').value })
    });
    const data = await res.json();
    if(!data.ok){ msg.textContent = data.error || 'An error occurred.'; msg.className='msg err'; msg.style.display='block'; return; }
    msg.textContent = 'Profile updated.'; msg.className='msg ok'; msg.style.display='block';
  } catch {
    msg.textContent = 'Network error — please try again.'; msg.className='msg err'; msg.style.display='block';
  }
});
</script>
</body>
</html>
