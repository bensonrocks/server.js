<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IdealInbound — Inbound Processing</title>
<style>
  :root{--bg:#F0F2F5;--surface:#FFFFFF;--border:#D7DCE3;--text:#1B2430;--text-2:#5B6472;--text-3:#8B93A0;--accent:#0B5FFF;--accent-dim:#D6E4FF;--ok:#127A45;--ok-bg:#DBF3E5;--warn:#9A6A00;--warn-bg:#FBEBC7;--idle:#5B6472;--idle-bg:#E7E9ED;--mono:'Courier New',Courier,monospace;--sans:system-ui,-apple-system,'Segoe UI',sans-serif}
  @media(prefers-color-scheme:dark){:root{--bg:#0E1116;--surface:#161B22;--border:#2B313C;--text:#E6E9EF;--text-2:#9AA3AF;--text-3:#6A7280;--accent:#4C8DFF;--accent-dim:#132A52;--ok:#3FCB84;--ok-bg:#0E2A1C;--warn:#E0B23C;--warn-bg:#332708;--idle:#9AA3AF;--idle-bg:#20242B}}
  :root[data-theme="light"]{--bg:#F0F2F5;--surface:#FFFFFF;--border:#D7DCE3;--text:#1B2430;--text-2:#5B6472;--text-3:#8B93A0;--accent:#0B5FFF;--accent-dim:#D6E4FF;--ok:#127A45;--ok-bg:#DBF3E5;--warn:#9A6A00;--warn-bg:#FBEBC7;--idle:#5B6472;--idle-bg:#E7E9ED}
  :root[data-theme="dark"]{--bg:#0E1116;--surface:#161B22;--border:#2B313C;--text:#E6E9EF;--text-2:#9AA3AF;--text-3:#6A7280;--accent:#4C8DFF;--accent-dim:#132A52;--ok:#3FCB84;--ok-bg:#0E2A1C;--warn:#E0B23C;--warn-bg:#332708;--idle:#9AA3AF;--idle-bg:#20242B}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;min-height:100vh}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:10}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.02em;text-decoration:none;color:var(--text)}
  .brand-dot{width:9px;height:9px;border-radius:2px;background:var(--accent)}
  .sign-out{font-size:.8rem;color:var(--text-2);text-decoration:none;background:none;border:none;cursor:pointer;font-family:inherit}
  .sign-out:hover{color:var(--accent)}
  .page{max-width:1180px;margin:0 auto;padding:28px 20px 60px}
  h1{font-size:1.4rem;margin-bottom:4px}
  .sub{color:var(--text-3);font-size:.85rem;margin-bottom:24px}
  .grid{display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
  .card h2{font-size:1rem;margin-bottom:14px}
  label{display:block;font-size:.72rem;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;margin:10px 0 4px}
  input,select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:.85rem;font-family:var(--sans)}
  input:focus,select:focus{outline:2px solid var(--accent);outline-offset:-1px}
  .hint{font-size:.72rem;color:var(--text-3);margin-top:6px}
  .item-row{display:grid;grid-template-columns:1fr 1fr 70px 28px;gap:6px;align-items:end;margin-top:8px}
  .item-row label{margin-top:0}
  .rm-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-3);height:34px;cursor:pointer}
  .rm-btn:hover{color:#C0304A;border-color:#C0304A}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:6px;border:1px solid var(--accent);background:var(--accent);color:#fff;font-size:.82rem;font-weight:600;cursor:pointer}
  .btn:hover{opacity:.9}
  .btn.secondary{background:none;color:var(--accent)}
  .btn.danger{background:none;color:#C0304A;border-color:#C0304A}
  .btn.small{padding:5px 10px;font-size:.72rem}
  .btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .err{color:#C0304A;font-size:.78rem;margin-top:8px;display:none}
  .tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
  .tab{padding:6px 12px;border-radius:99px;border:1px solid var(--border);background:var(--bg);color:var(--text-2);font-size:.74rem;cursor:pointer;font-weight:600}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:.82rem}
  th{text-align:left;color:var(--text-3);font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
  td{padding:9px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
  tr:last-child td{border-bottom:none}
  .status{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .status.expected{background:var(--idle-bg);color:var(--idle)}
  .status.receiving{background:var(--warn-bg);color:var(--warn)}
  .status.completed{background:var(--ok-bg);color:var(--ok)}
  .type-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;background:var(--accent-dim);color:var(--accent)}
  .empty{color:var(--text-3);font-size:.85rem;padding:20px 0;text-align:center}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal-bg.open{display:flex}
  .modal{background:var(--surface);border-radius:10px;padding:20px;max-width:680px;width:100%;max-height:88vh;overflow-y:auto}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .modal-head h2{font-size:1.05rem}
  .close-x{background:none;border:none;font-size:1.1rem;color:var(--text-3);cursor:pointer}
  .meta-line{font-size:.8rem;color:var(--text-2);margin-bottom:10px}
  .meta-line strong{color:var(--text)}
  .carton-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .carton-badge{font-weight:700;font-size:.8rem;background:var(--idle-bg);color:var(--idle);border-radius:6px;padding:4px 10px}
  .label-banner{display:none;background:var(--warn-bg);border:1px solid var(--warn);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:.82rem}
  .label-banner-inner{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .label-banner strong{font-family:var(--mono);font-size:.95rem}
  .scan-grid{display:grid;grid-template-columns:1.3fr .7fr 1fr auto auto;gap:8px;margin-top:10px;align-items:end}
  .scan-grid label{margin:0 0 4px}
  .var-pos{color:var(--ok)}
  .var-neg{color:#C0304A}
  .mono{font-family:var(--mono)}
  .photo-btn{width:38px;height:38px;border:1px solid var(--border);border-radius:6px;background:var(--bg);cursor:pointer;font-size:1rem;overflow:hidden;padding:0}
  .photo-btn.has-preview{border-color:var(--accent)}
  .photo-btn img{width:100%;height:100%;object-fit:cover;display:block}
  .photo-section{margin-top:16px}
  .photo-section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .photo-grid{display:flex;flex-wrap:wrap;gap:10px}
  .photo-card{display:flex;flex-direction:column;align-items:center;gap:4px;width:76px;text-align:center}
  .photo-card img{width:76px;height:76px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer}
  .photo-card .cap{font-size:.62rem;color:var(--text-3);line-height:1.2;word-break:break-word}
  .photo-add-tile{width:76px;height:76px;border:1px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-3);font-size:1.4rem;background:none}
  .lightbox-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;padding:24px;z-index:60}
  .lightbox-bg.open{display:flex}
  .lightbox-bg img{max-width:100%;max-height:100%;border-radius:6px}
  @media print{.topbar,.no-print{display:none!important}.page{padding:0;max-width:100%}.card{border:none}}
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="/inbound"><span class="brand-dot"></span>IdealInbound</a>
  <button class="sign-out no-print" onclick="signOut()">Sign Out</button>
</div>

<div class="page">
  <h1>Inbound Processing</h1>
  <div class="sub">Receive anything, any way it arrives — air freight, LCL, FCL, ecommerce returns, or loose drop-offs.</div>

  <div class="grid">
    <div class="card">
      <h2>New Inbound</h2>
      <label>Inbound Type</label>
      <select id="f-type" onchange="renderMetaFields()">
        <option value="air">Air Freight</option>
        <option value="lcl">LCL (Shared Container)</option>
        <option value="fcl">FCL (Full Container)</option>
        <option value="return">Ecommerce Return</option>
        <option value="loose">Loose / Ad-hoc</option>
      </select>

      <label>Reference / Lot #</label>
      <input id="f-reference" placeholder="INB-1042">
      <label id="f-source-label">Supplier / Shipper</label>
      <input id="f-source" placeholder="Acme Supply Co.">
      <label>Expected Date</label>
      <input id="f-date" type="date">

      <div id="meta-fields"></div>

      <label style="margin-top:16px">Pre-declared Line Items (optional)</label>
      <div class="hint" id="items-hint"></div>
      <div id="item-rows"></div>

      <div class="btn-row">
        <button class="btn secondary small" onclick="addItemRow()">+ Add Line Item</button>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="createInbound()">Create Inbound</button>
      </div>
      <div class="err" id="create-err"></div>
    </div>

    <div class="card">
      <h2>Inbounds</h2>
      <div class="tabs" id="tabs"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Reference</th><th>Type</th><th>Source</th><th>Status</th><th>Progress</th><th></th></tr>
          </thead>
          <tbody id="inbound-rows"></tbody>
        </table>
        <div class="empty" id="empty-msg" style="display:none">No inbounds yet — create one to get started.</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">Inbound</h2>
      <button class="close-x no-print" onclick="closeModal()">&times;</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="lightbox-bg no-print" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="">
</div>

<script>
const TYPE_CONFIG = {
  air:    { label: 'Air Freight',           sourceLabel: 'Supplier / Shipper',        itemsHint: 'From the air waybill manifest, if available.',
            fields: [ ['awb','AWB #'], ['flightNumber','Flight #'], ['carrier','Carrier'] ] },
  lcl:    { label: 'LCL (Shared Container)', sourceLabel: 'Supplier / Shipper',        itemsHint: 'From the packing list, if available.',
            fields: [ ['blNumber','BL #'], ['containerNumber','Container #'], ['cfsLocation','CFS Location'] ] },
  fcl:    { label: 'FCL (Full Container)',   sourceLabel: 'Supplier / Shipper',        itemsHint: 'From the packing list, if available.',
            fields: [ ['containerNumber','Container #'], ['sealNumber','Seal #'], ['blNumber','BL #'] ] },
  return: { label: 'Ecommerce Return',       sourceLabel: 'Customer / Order Source',   itemsHint: 'From the original order, if known — otherwise leave blank and receive/grade items as they\'re opened.',
            fields: [ ['rmaNumber','RMA #'], ['orderNumber','Order #'], ['returnReason','Return Reason'] ] },
  loose:  { label: 'Loose / Ad-hoc',         sourceLabel: 'Source / Notes',            itemsHint: 'Usually left empty — just log whatever shows up during receiving.',
            fields: [ ['notes','Notes'] ] },
};
const CONDITIONS = ['unspecified', 'sellable', 'damaged', 'refurbish', 'dispose'];
const CONDITION_LABEL = { unspecified: 'Unspecified', sellable: 'Sellable', damaged: 'Damaged', refurbish: 'Refurbish', dispose: 'Dispose' };

let currentInboundId = null;
let currentInboundRef = '';
let currentInboundCartons = [{ num: 1, scans: {}, labelConfirmed: false }];
let currentActiveCartonNum = 1;
let activeTypeFilter = '';
let scanPhotoFile = null;

function renderMetaFields() {
  const type = document.getElementById('f-type').value;
  const cfg = TYPE_CONFIG[type];
  document.getElementById('f-source-label').textContent = cfg.sourceLabel;
  document.getElementById('items-hint').textContent = cfg.itemsHint;
  const wrap = document.getElementById('meta-fields');
  wrap.innerHTML = cfg.fields.map(([key, label]) => `
    <label>${label}</label>
    <input class="meta-input" data-key="${key}" placeholder="${label}">
  `).join('');
}
renderMetaFields();

function addItemRow(sku, desc, qty) {
  const wrap = document.getElementById('item-rows');
  const row = document.createElement('div');
  row.className = 'item-row';
  row.innerHTML = `
    <div><label>SKU</label><input class="i-sku" value="${sku||''}" placeholder="SKU-001"></div>
    <div><label>Description</label><input class="i-desc" value="${desc||''}" placeholder="Widget"></div>
    <div><label>Qty</label><input class="i-qty" type="number" min="1" value="${qty||''}" placeholder="10"></div>
    <button class="rm-btn" onclick="this.parentElement.remove()" title="Remove">&times;</button>
  `;
  wrap.appendChild(row);
}

function readMetaFields() {
  const meta = {};
  document.querySelectorAll('#meta-fields .meta-input').forEach(inp => {
    if (inp.value.trim()) meta[inp.dataset.key] = inp.value.trim();
  });
  return meta;
}

async function createInbound() {
  const errEl = document.getElementById('create-err');
  errEl.style.display = 'none';

  const type = document.getElementById('f-type').value;
  const reference = document.getElementById('f-reference').value.trim();
  const source = document.getElementById('f-source').value.trim();
  const expectedDate = document.getElementById('f-date').value || null;
  const metadata = readMetaFields();
  const items = [...document.querySelectorAll('#item-rows .item-row')].map(row => ({
    sku: row.querySelector('.i-sku').value.trim(),
    description: row.querySelector('.i-desc').value.trim(),
    expectedQty: Number(row.querySelector('.i-qty').value),
  })).filter(i => i.sku);

  const res = await fetch('/api/inbounds', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type, reference, source, expectedDate, metadata, items }),
  });
  const data = await res.json();
  if (!data.ok) {
    errEl.textContent = data.error;
    errEl.style.display = 'block';
    return;
  }

  document.getElementById('f-reference').value = '';
  document.getElementById('f-source').value = '';
  document.getElementById('f-date').value = '';
  document.getElementById('item-rows').innerHTML = '';
  renderMetaFields();
  loadInbounds();
}

function statusLabel(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function renderTabs() {
  const tabs = [['', 'All'], ...Object.entries(TYPE_CONFIG).map(([k, c]) => [k, c.label])];
  document.getElementById('tabs').innerHTML = tabs.map(([val, label]) => `
    <button class="tab ${activeTypeFilter === val ? 'active' : ''}" onclick="setTypeFilter('${val}')">${label}</button>
  `).join('');
}
function setTypeFilter(val) {
  activeTypeFilter = val;
  renderTabs();
  loadInbounds();
}
renderTabs();

async function loadInbounds() {
  const qs = activeTypeFilter ? `?type=${activeTypeFilter}` : '';
  const res = await fetch(`/api/inbounds${qs}`);
  const data = await res.json();
  const tbody = document.getElementById('inbound-rows');
  const empty = document.getElementById('empty-msg');
  tbody.innerHTML = '';
  if (!data.ok || !data.inbounds.length) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  for (const s of data.inbounds) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="mono">${s.reference}</td>
      <td><span class="type-badge">${TYPE_CONFIG[s.type]?.label || s.type}</span></td>
      <td>${s.source}</td>
      <td><span class="status ${s.status}">${statusLabel(s.status)}</span></td>
      <td class="mono">${s.totalReceived} / ${s.totalExpected || '—'}</td>
      <td><button class="btn small" onclick="openInbound('${s.id}')">Open</button></td>
    `;
    tbody.appendChild(tr);
  }
}

function metaLine(inbound) {
  const cfg = TYPE_CONFIG[inbound.type];
  const parts = cfg.fields
    .map(([key, label]) => inbound.metadata?.[key] ? `${label}: <strong>${inbound.metadata[key]}</strong>` : null)
    .filter(Boolean);
  return parts.length ? parts.join(' &nbsp;·&nbsp; ') : '<em>No additional details recorded</em>';
}

function photoCaption(p) {
  if (p.caption) return p.caption;
  if (p.itemId) return 'Item photo';
  return 'Attachment';
}

function renderPhotoGallery(inbound) {
  const photos = inbound.photos || [];
  const cards = photos.map(p => `
    <div class="photo-card">
      <img src="/api/inbounds/${inbound.id}/photos/${p.id}" onclick="openLightbox('/api/inbounds/${inbound.id}/photos/${p.id}')">
      <div class="cap">${photoCaption(p)}</div>
    </div>
  `).join('');
  return `
    <div class="photo-grid">
      ${cards}
      <div class="photo-add-tile no-print" onclick="document.getElementById('general-photo-input').click()" title="Add photo">+</div>
    </div>
    <input type="file" id="general-photo-input" accept="image/*" capture="environment" style="display:none" onchange="uploadGeneralPhoto(this, '${inbound.id}')">
  `;
}

function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}

async function uploadGeneralPhoto(input, inboundId) {
  const file = input.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('photo', file);
  await fetch(`/api/inbounds/${inboundId}/photos`, { method: 'POST', body: formData });
  openInbound(inboundId);
}

function onScanPhotoChosen(input) {
  const file = input.files[0];
  if (!file) return;
  scanPhotoFile = file;
  const btn = document.getElementById('scan-photo-btn');
  btn.classList.add('has-preview');
  btn.innerHTML = `<img src="${URL.createObjectURL(file)}">`;
}

async function openInbound(id) {
  currentInboundId = id;
  scanPhotoFile = null;
  const res = await fetch(`/api/inbounds/${id}`);
  const data = await res.json();
  if (!data.ok) return;
  const s = data.inbound;
  const cfg = TYPE_CONFIG[s.type];
  currentInboundRef = s.reference;
  currentInboundCartons = s.cartons && s.cartons.length ? s.cartons : [{ num: 1, scans: {}, labelConfirmed: false }];
  currentActiveCartonNum = s.activeCartonNum || 1;

  document.getElementById('modal-title').textContent = `${s.reference} — ${s.source}`;
  const rows = s.items.map(i => `
    <tr>
      <td class="mono">${i.sku}</td>
      <td>${i.description || ''}</td>
      <td class="mono">${i.expectedQty || '—'}</td>
      <td class="mono">${i.receivedQty}</td>
    </tr>
  `).join('');

  const multiCarton = currentInboundCartons.length > 1;
  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:6px">
      <span class="type-badge">${cfg.label}</span>
      <span class="status ${s.status}">${statusLabel(s.status)}</span>
    </div>
    <div class="meta-line">${metaLine(s)}</div>
    <div class="carton-bar no-print">
      <button class="btn secondary small" id="carton-prev" onclick="switchCartonUI(-1)" style="display:${multiCarton ? '' : 'none'}">&larr;</button>
      <span class="carton-badge" id="carton-badge">${multiCarton ? `Carton ${currentActiveCartonNum} of ${currentInboundCartons.length}` : 'Carton 1'}</span>
      <button class="btn secondary small" id="carton-next" onclick="switchCartonUI(1)" style="display:${multiCarton ? '' : 'none'}">&rarr;</button>
      ${s.status !== 'completed' ? `<button class="btn secondary small" onclick="newCartonUI()">+ New Carton</button>` : ''}
      <button class="btn secondary small" id="carton-cancel-multi" onclick="cancelMultiCartonUI()" style="display:${multiCarton ? '' : 'none'}">&#8634; 1 Box</button>
    </div>
    <div class="label-banner no-print" id="label-banner"></div>
    <div class="scan-grid no-print">
      <div><label>Scan or type SKU</label><input id="scan-sku" placeholder="SKU (new SKUs are OK)"></div>
      <div><label>Qty</label><input id="scan-qty" type="number" min="1" value="1"></div>
      <div><label>Condition</label>
        <select id="scan-condition">
          ${CONDITIONS.map(c => `<option value="${c}">${CONDITION_LABEL[c]}</option>`).join('')}
        </select>
      </div>
      <div>
        <label>Photo</label>
        <button type="button" class="photo-btn" id="scan-photo-btn" onclick="document.getElementById('scan-photo-input').click()" title="Take / attach photo">📷</button>
        <input type="file" id="scan-photo-input" accept="image/*" capture="environment" style="display:none" onchange="onScanPhotoChosen(this)">
      </div>
      <button class="btn small" id="receive-btn" onclick="receiveScan()">Receive</button>
    </div>
    <div class="err" id="scan-err"></div>
    <div class="table-wrap" style="margin-top:14px">
      <table>
        <thead><tr><th>SKU</th><th>Description</th><th>Expected</th><th>Received</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="4" class="empty">No items received yet</td></tr>'}</tbody>
      </table>
    </div>
    <div class="photo-section">
      <div class="photo-section-head"><h2 style="margin:0;font-size:.95rem">Photos</h2></div>
      ${renderPhotoGallery(s)}
    </div>
    <div class="btn-row no-print">
      <button class="btn secondary small" onclick="printReport('${s.id}')">View / Print Receiving Report</button>
      ${s.status !== 'completed' ? `<button class="btn danger small" onclick="closeInbound('${s.id}')">Close Inbound</button>` : ''}
    </div>
  `;
  renderLabelBanner();
  document.getElementById('modal').classList.add('open');
}

// ── Cartons — a shipment/return often arrives across more than one box ─────
function activeCartonMeta() {
  return currentInboundCartons.find(c => c.num === currentActiveCartonNum) || currentInboundCartons[currentInboundCartons.length - 1];
}
// The label prompt is a real block, not cosmetic — the Receive button stays
// disabled until the packer confirms they've written the carton number on
// the box, same invariant as the outbound picking side of this system.
function renderLabelBanner() {
  const c = activeCartonMeta();
  const banner = document.getElementById('label-banner');
  const receiveBtn = document.getElementById('receive-btn');
  if (!banner) return;
  if (c && !c.labelConfirmed) {
    const label = `${currentInboundRef}-${String(c.num).padStart(2, '0')}`;
    banner.innerHTML = `<div class="label-banner-inner">&#128230; Write <strong>${label}</strong> on this box, then confirm.
      <button class="btn small" onclick="confirmLabelUI()">&#10003; I've Written It</button></div>`;
    banner.style.display = 'block';
    if (receiveBtn) receiveBtn.disabled = true;
  } else {
    banner.style.display = 'none';
    if (receiveBtn) receiveBtn.disabled = false;
  }
}
async function newCartonUI() {
  const res = await fetch(`/api/inbounds/${currentInboundId}/new-carton`, { method: 'POST' });
  const data = await res.json();
  if (!data.ok) { alert(data.error); return; }
  loadInbounds();
  openInbound(currentInboundId);
}
async function switchCartonUI(delta) {
  const target = currentActiveCartonNum + delta;
  if (target < 1 || target > currentInboundCartons.length) return;
  const res = await fetch(`/api/inbounds/${currentInboundId}/carton/switch`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ num: target }),
  });
  const data = await res.json();
  if (!data.ok) { alert(data.error); return; }
  openInbound(currentInboundId);
}
async function cancelMultiCartonUI() {
  if (!confirm('Merge every carton back into one box?')) return;
  const res = await fetch(`/api/inbounds/${currentInboundId}/carton/cancel-multi`, { method: 'POST' });
  const data = await res.json();
  if (!data.ok) { alert(data.error); return; }
  loadInbounds();
  openInbound(currentInboundId);
}
async function confirmLabelUI() {
  const c = activeCartonMeta();
  await fetch(`/api/inbounds/${currentInboundId}/carton/label-confirmed`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ num: c.num }),
  });
  openInbound(currentInboundId);
}

async function receiveScan() {
  const sku = document.getElementById('scan-sku').value.trim();
  const qty = Number(document.getElementById('scan-qty').value);
  const condition = document.getElementById('scan-condition').value;
  const errEl = document.getElementById('scan-err');
  errEl.style.display = 'none';
  if (!sku || !qty) return;

  const formData = new FormData();
  formData.append('sku', sku);
  formData.append('qty', qty);
  formData.append('condition', condition);
  if (scanPhotoFile) formData.append('photo', scanPhotoFile);

  const res = await fetch(`/api/inbounds/${currentInboundId}/receive`, {
    method: 'POST',
    body: formData,
  });
  const data = await res.json();
  if (!data.ok) {
    errEl.textContent = data.error;
    errEl.style.display = 'block';
    return;
  }
  scanPhotoFile = null;
  loadInbounds();
  openInbound(currentInboundId);
}

async function closeInbound(id) {
  if (!confirm('Close this inbound? This marks it completed even if quantities don\'t fully match the manifest.')) return;
  await fetch(`/api/inbounds/${id}/close`, { method: 'POST' });
  loadInbounds();
  openInbound(id);
}

async function printReport(id) {
  const res = await fetch(`/api/inbounds/${id}/report`);
  const data = await res.json();
  if (!data.ok) return;
  const r = data.report;
  const cfg = TYPE_CONFIG[r.type];
  const showConditions = r.items.some(i => Object.entries(i.conditionTotals || {}).some(([k, v]) => k !== 'unspecified' && v > 0));

  const rows = r.items.map(i => `
    <tr>
      <td class="mono">${i.sku}</td>
      <td>${i.description || ''}</td>
      <td class="mono">${i.expectedQty || '—'}</td>
      <td class="mono">${i.receivedQty}</td>
      <td class="mono ${i.variance < 0 ? 'var-neg' : i.variance > 0 ? 'var-pos' : ''}">${i.expectedQty ? (i.variance > 0 ? '+' : '') + i.variance : '—'}</td>
      ${showConditions ? CONDITIONS.map(c => `<td class="mono">${i.conditionTotals?.[c] || 0}</td>`).join('') : ''}
    </tr>
  `).join('');

  document.getElementById('modal-title').textContent = `Receiving Report — ${r.reference}`;
  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:6px">
      <span class="type-badge">${cfg.label}</span>
      <span class="status ${r.status}">${statusLabel(r.status)}</span>
    </div>
    <div class="meta-line">${metaLine(r)}</div>
    <div class="meta-line">Source: <strong>${r.source}</strong> &nbsp;·&nbsp; Expected date: ${r.expectedDate ? r.expectedDate.slice(0,10) : '—'}</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>SKU</th><th>Description</th><th>Expected</th><th>Received</th><th>Variance</th>
          ${showConditions ? CONDITIONS.map(c => `<th>${CONDITION_LABEL[c]}</th>`).join('') : ''}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${cartonBreakdownHtml(r)}
    <div class="photo-section">
      <div class="photo-section-head"><h2 style="margin:0;font-size:.95rem">Photos</h2></div>
      ${renderPhotoGallery(r)}
    </div>
    <div class="btn-row no-print">
      <button class="btn small" onclick="window.print()">Print</button>
      <button class="btn secondary small" onclick="openInbound('${r.id}')">Back</button>
    </div>
  `;
}

// Only shown once a job has actually split — a single-carton job (the vast
// majority) looks exactly like the report always did.
function cartonBreakdownHtml(r) {
  if (!r.cartons || r.cartons.length <= 1) return '';
  const rows = r.cartons.flatMap(c =>
    Object.entries(c.scans || {}).filter(([, qty]) => qty > 0).map(([sku, qty]) => {
      const item = r.items.find(i => i.sku === sku);
      return `<tr><td class="mono">${c.num}</td><td class="mono">${sku}</td><td>${item?.description || ''}</td><td class="mono">${qty}</td></tr>`;
    })
  ).join('');
  return `
    <div class="photo-section">
      <div class="photo-section-head"><h2 style="margin:0;font-size:.95rem">Cartons</h2></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Carton</th><th>SKU</th><th>Description</th><th>Qty</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  currentInboundId = null;
  scanPhotoFile = null;
}

async function signOut() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login';
}

loadInbounds();
</script>
</body>
